<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>sumi ai - n5 mastery garden pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@600&family=Quicksand:wght@300;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <style>
        :root {
            --paper: #fdfcf8; 
            --ink: #1a1a1a;
            --muji-red: #a63d40;
            --orange: #e67e22; 
            --green: #81c784;
            --border: #e0ddd5;
            --bg-soft: #f0ede5;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg-soft);
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            color: var(--ink);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow: hidden;
            text-transform: lowercase;
        }

        /* --- BANNER VỚI HIỆU ỨNG LẬT SỐ --- */
        .academic-pill-banner {
            width: 100%;
            max-width: 900px;
            padding: 20px 40px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            margin-bottom: 25px;
        }

        .brand-zone { display: flex; flex-direction: column; gap: 5px; }
        .brand-top { display: flex; align-items: center; gap: 12px; }
        .brand-logo { 
            width: 35px; height: 35px; background: var(--muji-red); 
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: 700; font-size: 0.7rem; transform: rotate(-10deg);
        }
        .main-title { font-size: 1.8rem; letter-spacing: 4px; font-weight: 700; margin: 0; color: var(--ink); }
        .sub-title { font-size: 0.65rem; letter-spacing: 3px; color: var(--muji-red); font-weight: 700; text-transform: uppercase; }

        .mastery-stats { display: flex; gap: 15px; }
        .flip-box {
            background: #fff;
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid var(--border);
            text-align: center;
            min-width: 100px;
            perspective: 1000px;
        }
        .flip-box.highlight { border-color: var(--orange); }
        .stat-label { display: block; font-size: 0.55rem; font-weight: 700; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        
        .stat-num {
            font-size: 1.8rem;
            font-weight: 700;
            display: inline-block;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .highlight .stat-num { color: var(--orange); }
        .flipping { animation: flipAnim 0.6s ease-in-out; }
        @keyframes flipAnim {
            0% { transform: rotateX(0deg); }
            50% { transform: rotateX(-90deg); opacity: 0; }
            100% { transform: rotateX(0deg); opacity: 1; }
        }

        /* --- KHUNG LƯU TRỮ --- */
        .archive-vault {
            flex: 1;
            width: 100%;
            max-width: 900px;
            background: var(--paper);
            border-radius: 50px;
            border: 2px solid var(--border);
            padding: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); 
            gap: 20px;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05);
        }

        .archive-vault::-webkit-scrollbar { width: 3px; }
        .archive-vault::-webkit-scrollbar-thumb { background: var(--orange); border-radius: 10px; }

        /* --- THẺ KANJI --- */
        .kanji-item {
            background: #fff;
            border-radius: 30px;
            aspect-ratio: 1 / 1.3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid var(--border);
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            position: relative;
            opacity: 0.25;
            filter: grayscale(1);
        }

        .kanji-item.mastered {
            opacity: 1;
            filter: grayscale(0);
            border-color: var(--orange);
            background: linear-gradient(145deg, #ffffff, #fffaf5);
            box-shadow: 0 15px 35px rgba(230, 126, 34, 0.1);
        }

        .kanji-item:hover { transform: scale(1.08) rotate(2deg); opacity: 1; border-color: var(--muji-red); }

        .char-box { font-family: 'Klee One', cursive; font-size: 3.5rem; color: var(--ink); transition: 0.4s; }
        .mastered .char-box { color: var(--muji-red); text-shadow: 2px 2px 0px rgba(0,0,0,0.05); }

        .hv-tag { font-size: 0.9rem; font-weight: 700; color: #888; margin-top: 10px; letter-spacing: 1px; }
        .mastered .hv-tag { color: var(--orange); }

        .progress-circle { position: absolute; top: 12px; right: 12px; width: 12px; height: 12px; border-radius: 50%; background: #eee; border: 2px solid #ddd; }
        .mastered .progress-circle { background: var(--orange); border-color: var(--orange); box-shadow: 0 0 5px var(--orange); }

        /* --- MODAL WORKBOOK 2 TRANG --- */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 26, 26, 0.9);
            display: none; align-items: center; justify-content: center;
            z-index: 100; backdrop-filter: blur(10px);
            padding: 20px;
        }
        .modal.active { display: flex; }

        .workbook {
            width: 100%; max-width: 1000px; background: #fff;
            border-radius: 40px; border: 1px solid var(--border);
            display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 30px 70px rgba(0,0,0,0.3);
        }

        .page { width: 100%; padding: 40px 25px; display: flex; flex-direction: column; align-items: center; }
        .page-left { border-bottom: 1px solid var(--border); perspective: 1000px; background: #fcfcfc; }
        
        .flip-card {
            width: 100%; max-width: 280px; aspect-ratio: 1 / 1.2;
            cursor: pointer; position: relative; transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .flip-card.is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 30px;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; border: 2px solid var(--border);
            background: #fff; padding: 20px;
        }
        .card-back { transform: rotateY(180deg); border-color: var(--orange); }

        .btn-illuminate {
            background: var(--ink); color: #fff; border: none;
            padding: 14px 40px; border-radius: 50px; font-weight: 700;
            cursor: pointer; margin-top: 20px; font-family: inherit;
            text-transform: uppercase; font-size: 0.75rem; letter-spacing: 2px;
        }

        @media (min-width: 900px) {
            .workbook { flex-direction: row; min-height: 600px; position: relative; }
            .page { flex: 1; padding: 50px; }
            .page-left { border-bottom: none; border-right: 1px solid var(--border); }
            .workbook::after {
                content: ""; position: absolute; left: 50%; top: 10%;
                width: 1px; height: 80%; background: var(--border);
            }
        }
    </style>
</head>
<body>

    <div class="academic-pill-banner">
        <div class="brand-zone">
            <div class="brand-top">
                <div class="brand-logo">AI</div>
                <h1 class="main-title">SUMI GARDEN</h1>
            </div>
            <div class="sub-title">n5 mastery intellectual archive</div>
        </div>

        <div class="mastery-stats">
            <div class="flip-box highlight">
                <span class="stat-label">mastered</span>
                <span class="stat-num" id="mastered-count">0</span>
            </div>
            <div class="flip-box">
                <span class="stat-label">total</span>
                <span class="stat-num" id="total-count">0</span>
            </div>
        </div>
    </div>

    <div class="archive-vault" id="garden-grid"></div>

    <div id="modal" class="modal">
        <div class="workbook">
            <!-- TRANG TRÁI -->
            <div class="page page-left">
                <div class="flip-card" id="card" onclick="flipCard()">
                    <div class="card-face card-front">
                        <div id="k-display" style="font-size: 5rem; font-family: 'Klee One'; color: var(--ink);"></div>
                        <p id="det-hv" style="font-size: 2rem; color: var(--muji-red); font-weight: 700; margin-top: 15px;"></p>
                    </div>
                    <div class="card-face card-back">
                        <div id="drawing-zone"></div>
                        <button class="btn-illuminate" id="btn-save">thắp sáng ✨</button>
                    </div>
                </div>
                <p style="font-size: 0.6rem; color: #999; margin-top: 20px;">[ chạm để luyện viết ]</p>
            </div>

            <!-- TRANG PHẢI -->
            <div class="page" style="background: #fafafa; align-items: flex-start;">
                <div style="width: 100%; border-bottom: 1px solid var(--border); padding-bottom: 20px; margin-bottom: 25px;">
                    <span style="font-size: 0.6rem; color: #aaa; letter-spacing: 2px; font-weight: 700;">ONYOMI</span>
                    <div style="font-size: 1.5rem; color: var(--orange); font-weight: 700;" id="det-on"></div>
                </div>
                <div style="width: 100%; margin-bottom: 25px;">
                    <span style="font-size: 0.6rem; color: #aaa; letter-spacing: 2px; font-weight: 700;">KUNYOMI</span>
                    <div style="font-size: 1.5rem; color: var(--green); font-weight: 700;" id="det-kun"></div>
                </div>
                <div style="margin-top: auto; color: #ccc; cursor: pointer; font-size: 0.7rem; font-weight: 700;" onclick="closeModal()">[ close archive ]</div>
            </div>
        </div>
    </div>

<script>
    let allData = [];
    let writer = null;

    async function init() {
        try {
            const res = await fetch('JLPT.json');
            const data = await res.json();
            allData = data["N5"] || [];
            updateStats(false);
            render();
        } catch (e) { console.error("Data error"); }
    }

    function updateStats(animate) {
        const mastered = JSON.parse(localStorage.getItem('sumi_garden_n5') || '[]');
        const masteredEl = document.getElementById('mastered-count');
        
        if (animate && masteredEl.innerText != mastered.length) {
            masteredEl.classList.add('flipping');
            setTimeout(() => {
                masteredEl.innerText = mastered.length;
                masteredEl.classList.remove('flipping');
            }, 300);
        } else {
            masteredEl.innerText = mastered.length;
        }
        document.getElementById('total-count').innerText = allData.length;
    }

    function render() {
        const grid = document.getElementById('garden-grid');
        grid.innerHTML = '';
        const mastered = JSON.parse(localStorage.getItem('sumi_garden_n5') || '[]');

        allData.forEach((item) => {
            const isMastered = mastered.includes(item.c);
            const node = document.createElement('div');
            node.className = 'kanji-item' + (isMastered ? ' mastered' : '');
            node.innerHTML = `<div class="progress-circle"></div><div class="char-box">${item.c}</div><div class="hv-tag">${item.hv}</div>`;
            node.onclick = () => openModal(item);
            grid.appendChild(node);
        });
    }

    function openModal(item) {
        document.getElementById('modal').classList.add('active');
        document.getElementById('det-hv').innerText = item.hv;
        document.getElementById('det-on').innerText = item.on || '---';
        document.getElementById('det-kun').innerText = item.kun || '---';
        document.getElementById('k-display').innerText = item.c;

        const box = document.getElementById('drawing-zone');
        box.innerHTML = '';
        writer = HanziWriter.create('drawing-zone', item.c, {
            width: 220, height: 220, padding: 25,
            strokeColor: '#a63d40', outlineColor: '#f0f0f0', showOutline: true
        });

        document.getElementById('btn-save').onclick = (e) => {
            e.stopPropagation();
            let mastered = JSON.parse(localStorage.getItem('sumi_garden_n5') || '[]');
            if (!mastered.includes(item.c)) {
                mastered.push(item.c);
                localStorage.setItem('sumi_garden_n5', JSON.stringify(mastered));
                updateStats(true);
            }
            closeModal();
            render();
        };
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('is-flipped');
        if (document.getElementById('card').classList.contains('is-flipped')) {
            setTimeout(() => writer.animateCharacter(), 300);
        }
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('active');
        document.getElementById('card').classList.remove('is-flipped');
    }

    window.onload = init;
</script>

</body>
</html>
