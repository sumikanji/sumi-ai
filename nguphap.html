<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sumi AI - Neubrutalism Horizontal</title>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #fdf8f1;
            --grid-color: #aac9a1;
            --card-bg: #ffffff;
            --accent-yellow: #fff3bf;
            --accent-blue: #fff3bf;
            --accent-green: #fff3bf;
            --muji-red: #a63d40;
            --black: #2b2d42;
            --border-thick: 4px solid var(--black);
            --shadow: 10px 10px 0px var(--black);
            --shadow-active: 3px 3px 0px var(--black);
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                linear-gradient(var(--grid-color) 1.2px, transparent 1.2px),
                linear-gradient(90deg, var(--grid-color) 1.2px, transparent 1.2px);
            background-size: 30px 30px; 
            font-family: 'Be Vietnam Pro', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--black);
            overflow-x: hidden;
        }

        /* CONTAINER NGANG */
        .flashcard-container {
            perspective: 2000px;
            width: 90%;
            max-width: 900px; /* Tăng chiều ngang */
            height: 500px;    /* Giảm chiều cao */
            cursor: pointer;
        }

        .flashcard {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }

        .flashcard.is-flipped { transform: rotateX(180deg); } /* Lật theo trục ngang */

        .btn-speak {
    background: #fff;
    border: 3px solid var(--black);
    cursor: pointer;
    width: 45px;
    height: 45px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 4px 4px 0px var(--black);
    transition: 0.1s;
    float: right;
    margin-left: 15px;
    border-radius: 4px;
}

.btn-speak:active {
    transform: translate(2px, 2px);
    box-shadow: 0px 0px 0px #000;
}

.btn-speak svg {
    width: 24px;
    height: 24px;
    fill: var(--black);
}

.btn-speak:hover {
    background: var(--accent-progress);
}

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border: var(--border-thick);
            background: var(--card-bg);
            box-shadow: var(--shadow);
            display: flex;
            padding: 0; /* Xử lý padding trong cột */
            box-sizing: border-box;
            border-radius: 4px;
            overflow: hidden;
        }

        /* MẶT TRƯỚC: GIỮ NGUYÊN KIỂU TẬP TRUNG */
        .card-front { 
            align-items: center; 
            justify-content: center; 
            background: var(--accent-yellow); 
            flex-direction: column;
        }

        /* MẶT SAU: CHIA 2 CỘT */
        .card-back { 
            transform: rotateX(180deg); 
            display: grid;
            grid-template-columns: 1fr 1.5fr; /* 2 Cột: Nghĩa | Ví dụ */
            background: var(--card-bg);
        }

        /* CỘT TRÁI (NGHĨA) */
        .back-left {
            border-right: var(--border-thick);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            background: #fbfaf5;
        
            text-align: center;
        }

        /* CỘT PHẢI (VÍ DỤ) */
        .back-right {
            padding: 30px;
            overflow-y: auto;
            background: #fbfaf5;
        }

        .level-badge {
            background: var(--black);
            color: white;
            padding: 6px 20px;
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 20px;
            box-shadow: 4px 4px 0px var(--muji-red);
        }

        .grammar-main {
            font-size: 50px;
            font-weight: 900;
            color: var(--black);
            line-height: 1.2;
        }

        .meaning-main {
            font-size: 32px;
            font-weight: 900;
            color: var(--muji-red);
            margin-top: 10px;
        }

        /* VÍ DỤ NÉT THANH */
        .example-card {
            background: var(--accent-blue);
            border: var(--border-thick);
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 6px 6px 0px var(--black);
        }

        .example-card:nth-child(even) { background: var(--accent-green); }

        .example-jp { 
            font-size: 20px; 
            font-weight: 500; 
            line-height: 1.7; 
            margin-bottom: 8px;
        }

        .example-vn { 
            font-size: 14px; 
            font-weight: 700; 
            background: rgba(255,255,255,0.6);
            padding: 4px 8px;
            display: inline-block;
        }

        /* ĐIỀU KHIỂN */
        .controls { display: flex; gap: 20px; margin-top: 40px; width: 90%; max-width: 900px; }
        .btn {
            flex: 1;
            padding: 20px;
            border: var(--border-thick);
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            background: white;
            box-shadow: 6px 6px 0px var(--black);
            transition: 0.1s;
        }
        .btn:active { transform: translate(3px, 3px); box-shadow: 0px 0px 0px #000; }
        .btn-next { background: #73cb70; }

        .progress-text { 
            margin-top: 25px; 
            font-weight: 900; 
            font-size: 20px; 
            background: white;
            padding: 5px 20px;
            border: var(--border-thick);
        }
        
        ruby rt { color: var(--muji-red); font-weight: 700; font-size: 0.55em; }
        .hint { margin-top: 40px; font-weight: 700; font-size: 12px; color: rgba(0,0,0,0.3); text-transform: uppercase; }

        .back-right::-webkit-scrollbar { width: 8px; }
        .back-right::-webkit-scrollbar-thumb { background: var(--black); border: 2px solid white; }
    </style>
</head>
<body>

    <div class="flashcard-container" onclick="flipCard()">
        <div class="flashcard" id="card">
            <!-- MẶT TRƯỚC -->
            <div class="card-face card-front">
                <div class="level-badge" id="frontLevel">N2</div>
                <div class="grammar-main" id="frontGrammar"></div>
                <div class="hint">Chạm để xem nghĩa & ví dụ</div>
            </div>

            <!-- MẶT SAU (NGANG 2 CỘT) -->
            <div class="card-face card-back">
                <div class="back-left">
                    <div class="level-badge" id="backLevelBadge">N2</div>
                    <div class="meaning-main" id="backMeaning"></div>
                    <div style="font-size: 12px; margin-top: 20px; font-weight: 700; opacity: 0.4;">CHẠM ĐỂ QUAY LẠI</div>
                </div>
                <div class="back-right">
                    <div style="font-size: 12px; font-weight: 900; margin-bottom: 15px; text-transform: uppercase; color: var(--muji-red);">Ví dụ minh họa</div>
                    <div id="backExamples"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn" onclick="event.stopPropagation(); move(-1)">LÙI LẠI</button>
        <button class="btn btn-next" onclick="event.stopPropagation(); move(1)">MẪU TIẾP THEO</button>
    </div>

    <div class="progress-text" id="progress">0 / 0</div>

    <script>
        let dataList = [];
        let currentIndex = 0;

        window.onload = function() {
            const savedData = localStorage.getItem('sumi_v3_data');
            if (savedData) {
                dataList = JSON.parse(savedData);
                if (dataList.length > 0) render();
            }
        };

        function flipCard() {
            document.getElementById('card').classList.toggle('is-flipped');
        }

     function render() {
    const item = dataList[currentIndex];
    const card = document.getElementById('card');
    card.classList.remove('is-flipped');

    // Cập nhật thông tin thẻ
    document.getElementById('frontLevel').innerText = item.level;
    document.getElementById('backLevelBadge').innerText = item.level;
    document.getElementById('frontGrammar').innerHTML = item.grammarHtml || item.grammarRaw;
    document.getElementById('backMeaning').innerText = item.meaning;

    // Xử lý danh sách ví dụ
    const exHtml = item.examples.map(ex => {
        // Tạo trình lọc văn bản để loại bỏ thẻ <rt> (phiên âm Furigana)
        const filterDiv = document.createElement('div');
        filterDiv.innerHTML = ex.jpRuby;
        filterDiv.querySelectorAll('rt').forEach(rt => rt.remove());
        const cleanText = filterDiv.innerText.trim();

        return `
            <div class="example-card">
                <button class="btn-speak" onclick="speak('${cleanText.replace(/'/g, "\\'")}', event)" title="Nghe đọc">
                    <svg viewBox="0 0 24 24">
                        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                    </svg>
                </button>
                <div class="example-jp">${ex.jpRuby}</div>
                <div class="example-vn">${ex.vn}</div>
            </div>
        `;
    }).join('');

    document.getElementById('backExamples').innerHTML = exHtml;

// 3. CẬP NHẬT KHUNG ĐẾM SỐ (Fix lỗi tại đây)
    const total = dataList.length;
    const current = currentIndex + 1;
    const progressElement = document.getElementById('progress');
    
    if (progressElement) {
        progressElement.innerText = `${current} / ${total}`;
    }
   
}

function speak(text, event) {
    if (event) event.stopPropagation();

    // Dừng âm thanh đang phát để tránh đọc chồng lên nhau
    window.speechSynthesis.cancel();

    const utterance = new SpeechSynthesisUtterance(text);
    const voices = window.speechSynthesis.getVoices();

    // Tìm giọng Nhật chất lượng cao (Google hoặc Microsoft Natural)
    const preferredVoice = voices.find(v => 
        v.lang === 'ja-JP' && (v.name.includes('Google') || v.name.includes('Natural'))
    ) || voices.find(v => v.lang === 'ja-JP');

    if (preferredVoice) utterance.voice = preferredVoice;
    
    utterance.lang = 'ja-JP';
    utterance.rate = 0.85; // Tốc độ hơi chậm một chút để nghe rõ Kanji
    utterance.pitch = 1.0;

    window.speechSynthesis.speak(utterance);
}

// Đảm bảo trình duyệt load đủ voice khi khởi động
if ('speechSynthesis' in window) {
    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}

        function move(step) {
            currentIndex += step;
            if (currentIndex < 0) currentIndex = dataList.length - 1;
            if (currentIndex >= dataList.length) currentIndex = 0;
            render();
        }

        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
        // Ngăn chặn hành vi mặc định (cuộn trang) của trình duyệt
        e.preventDefault(); 
        // Chỉ thực hiện lật thẻ
        flipCard();
    }
            if (e.code === 'ArrowRight') move(1);
            if (e.code === 'ArrowLeft') move(-1);
        });
    </script>
</body>
</html>
