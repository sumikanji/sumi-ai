<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>nông trại kanji - sumi ai</title>
    <style>
        :root {
            --bg: #e0e7d8; --sidebar: #f8f1e5; --grass: #a5d6a7; --soil: #795548;
            --dark: #333333; --white: #ffffff; --accent: #ffb74d; --exp: #ba68c8; --kanji-red: #a63d40;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; font-weight: bold; text-transform: lowercase; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--bg); 
            display: flex; 
            min-height: 100vh; 
            overflow-x: hidden; /* Chỉ khóa cuộn ngang */
            overflow-y: auto;   /* Cho phép cuộn dọc toàn trang */
            color: var(--dark); 
        }

        /* --- Sidebar (Cố định vị trí khi cuộn trang) --- */
        .sidebar { 
            width: 280px; background: var(--sidebar); border-right: 6px solid var(--dark); 
            display: flex; flex-direction: column; padding: 25px; gap: 20px; 
            position: sticky; top: 0; height: 100vh; 
        }
        
        .char-frame { background: var(--white); border: 5px solid var(--dark); border-radius: 30px; padding: 15px; text-align: center; box-shadow: 0 8px 0 var(--dark); }
        .avatar-main { width: 80px; height: 80px; background: #ffccbc; margin: 0 auto 10px; border-radius: 50%; border: 5px solid var(--dark); font-size: 2.5rem; display: flex; align-items: center; justify-content: center; }
        .exp-info { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 5px; }
        .exp-bar { width: 100%; height: 16px; background: #eee; border-radius: 10px; border: 3px solid var(--dark); overflow: hidden; }
        #exp-fill { height: 100%; background: var(--exp); transition: 0.5s; width: 0%; }
        .nav-menu { display: flex; flex-direction: column; gap: 15px; }
        .nav-btn { background: var(--white); border: 4px solid var(--dark); border-radius: 20px; padding: 15px; cursor: pointer; display: flex; align-items: center; gap: 12px; box-shadow: 0 6px 0 var(--dark); justify-content: center; font-size: 1rem; transition: 0.1s; }
        .nav-btn.active { background: var(--accent); color: white; }
        .nav-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--dark); }

        /* --- Main Area --- */
        .main-game { flex: 1; padding: 30px; display: flex; flex-direction: column; gap: 20px; min-height: 100vh; }
        .top-stats { display: flex; justify-content: flex-end; gap: 15px; position: sticky; top: 20px; z-index: 5; }
        .coin-box { background: white; padding: 8px 20px; border: 4px solid var(--dark); border-radius: 20px; box-shadow: 0 5px 0 var(--dark); display: flex; align-items: center; gap: 10px; font-size: 1.2rem; }
        .sumi-coin-img { width: 32px; height: 32px; animation: coin-rotate 4s infinite linear; }
        @keyframes coin-rotate { 0% { transform: rotateY(0deg); } 100% { transform: rotateY(360deg); } }

        /* --- Garden Display --- */
        .display-area { flex: 1; display: flex; flex-direction: column; position: relative; }
        #garden-view { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 100%; max-width: 600px; margin: auto;
            background: var(--grass); border: 8px solid var(--dark); border-radius: 50px; padding: 40px; box-shadow: inset 0 0 50px rgba(0,0,0,0.1);
        }
        .plot { background: var(--soil); border: 6px solid #4e342e; border-radius: 30px; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: inset 0 -10px 0 rgba(0,0,0,0.3); aspect-ratio: 1/1; }
        .kanji-main { width: 85%; height: 85%; background: white; border: 4px solid var(--dark); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 4rem; box-shadow: 0 5px 0 var(--dark); animation: grow 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* --- KHO HẠT GIỐNG: TRẢI DÀI TOÀN TRANG --- */
        .overlay-panel { 
            background: #fff9c4; border: 8px solid var(--dark); border-radius: 40px; 
            display: none; flex-direction: column; padding: 30px; 
            margin-top: 20px; width: 100%;
            /* Bỏ vị trí absolute để nó trải dài theo body scroll */
        }
        .seed-list { 
            display: grid; 
            grid-template-columns: repeat(8, 1fr); /* 8 cột cực to rõ trên PC */
            gap: 15px; 
            padding: 10px; 
            /* Bỏ overflow riêng */
        }
        .seed-item { 
            background: var(--white); border: 4px solid var(--dark); border-radius: 15px; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            box-shadow: 0 6px 0 var(--dark); aspect-ratio: 1 / 1.1; 
            padding: 10px; cursor: pointer; transition: 0.1s;
        }
        .seed-item:hover { transform: translateY(-5px); background: #fffde7; }
        
        .seed-item .k-char { font-size: 2.8rem; line-height: 1; margin-bottom: 5px; color: var(--dark); }
        .seed-item .k-hv { font-size: 1.1rem; color: var(--kanji-red); width: 95%; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* --- Mobile Responsive --- */
        @media (max-width: 768px) {
            body { flex-direction: column; overflow-y: auto; }
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 6px solid var(--dark); padding: 10px; position: relative; }
            .char-frame { display: none; }
            .nav-menu { flex-direction: row; flex-wrap: wrap; justify-content: center; gap: 8px; }
            .nav-btn { padding: 8px; font-size: 0.8rem; min-width: 90px; }
            .main-game { padding: 15px; height: auto; }
            .top-stats { position: relative; top: 0; margin-bottom: 15px; }
            
            #garden-view { grid-template-columns: repeat(3, 1fr); padding: 20px; border-radius: 35px; }
            .seed-list { grid-template-columns: repeat(3, 1fr); gap: 10px; }
            .seed-item .k-char { font-size: 2rem; }
            .seed-item .k-hv { font-size: 0.8rem; }
            .overlay-panel { border-radius: 25px; padding: 15px; }
        }

        @keyframes grow { 0% { transform: scale(0); } 100% { transform: scale(1); } }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: #fdf5e6; border: 10px solid var(--dark); border-radius: 50px; padding: 40px; width: 90%; max-width: 450px; text-align: center; }
        .big-kanji { font-size: 6rem; font-weight: 900; background: var(--white); border: 6px solid var(--dark); border-radius: 30px; margin: 20px 0; padding: 10px; }
        .float-text { position: absolute; font-size: 1.2rem; color: #f39c12; pointer-events: none; animation: floatUp 1s forwards; font-weight: 900; z-index: 50; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-50px); opacity: 0; } }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="char-frame">
            <div class="avatar-main">🤖</div>
            <div style="font-size: 1.2rem;">sumi bot</div>
            <div class="exp-container">
                <div class="exp-info"><span>exp</span><span><span id="exp-val">0</span>/100</span></div>
                <div class="exp-bar"><div id="exp-fill"></div></div>
                <div style="font-size: 0.9rem; margin-top: 5px;">lv.<span id="level-val">1</span></div>
            </div>
        </div>
        <nav class="nav-menu">
            <button class="nav-btn active" id="btn-garden" onclick="showView('garden')">🏡 vườn kanji</button>
            <button class="nav-btn" id="btn-seeds" onclick="showView('seeds')">🌱 kho hạt</button>
        </nav>
    </aside>

    <main class="main-game">
        <div class="top-stats">
            <div class="coin-box">
                <img class="sumi-coin-img" src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgdmlld0JveD0iMCAwIDEwMCAxMDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+CiAgPGNpcmNsZSBjeD0iNTAiIGN5PSI1NCIgcj0iNDYiIGZpbGw9IiMzMzMzMzMiLz4KICA8Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSI0NiIgZmlsbD0iI2ZmYjc0ZCIgc3Ryb2tlPSIjMzMzMzMzIiBzdHJva2Utd2lkdGg9IjgiLz4KICA8Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSIzMCIgZmlsbD0id2hpdGUiIHN0cm9rZT0iIzMzMzMzMyIgc3Ryb2tlLXdpZHRoPSI0Ii8+CiAgPHBhdGggZD0iTTQyIDM4QzQyIDM0IDU4IDM0IDU4IDQzQzU4IDUwIDQyIDQ3IDQyIDU1QzQyIDY1IDU4IDY1IDU4IDYxIiBzdHJva2U9IiNhNjNkNDAiIHN0cm9rZS13aWR0aD0iMTAiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIgc3Ryb2tlLWxpbmVqb2luPSJyb3VuZCIvPgogIDxwYXRoIGQ9Ik0zNCAzMEMyOCAzNCAyOCA0NCAzNCA1MCIgc3Ryb2tlPSJ3aGl0ZSIgc3Ryb2tlLXdpZHRoPSI0IiBzdHJva2UtbGluZWNhcD0icm91bmQiIG9wYWNpdHk9IjAuNSIvPgo8L3N2Zz4=">
                <span id="sumi-coin-balance">0</span>
            </div>
        </div>

        <div class="display-area">
            <div id="garden-view" class="garden-grid"></div>
            
            <div id="seeds-view" class="overlay-panel">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h2 style="font-size:2rem;">🌱 kho hạt giống (trải dài)</h2>
                    <button onclick="showView('garden')" style="border:none; background:none; font-size:2.5rem; cursor:pointer;">✖</button>
                </div>
                <div class="seed-list" id="seed-container"></div>
            </div>
        </div>
    </main>

    <div id="modal-review" class="modal">
        <div class="modal-content">
            <h2 id="m-hv" style="color: var(--kanji-red); font-size: 2rem;">âm hán</h2>
            <div class="big-kanji" id="m-kanji">?</div>
            <p id="m-meaning" style="font-size: 1.5rem;">ý nghĩa...</p>
            <button class="nav-btn" style="background:var(--kanji-red); color:white; margin-top:30px; width:100%; font-size:1.2rem;" onclick="harvestKanji()">🧺 thu hoạch ngay (+10 🪙)</button>
        </div>
    </div>

    <script>
        let kanjiData = []; 
        let gardenPlots = JSON.parse(localStorage.getItem('sumi_garden_plots')) || ["日", "本"];
        let sumiCoins = parseInt(localStorage.getItem('sumi_coin_balance')) || 200;
        let sumiExp = parseInt(localStorage.getItem('sumi_exp')) || 0;
        let sumiLevel = parseInt(localStorage.getItem('sumi_level')) || 1;
        let currentHarvestingIndex = -1;

        async function loadData() {
            try {
                const res = await fetch('data.json'); 
                const raw = await res.json();
                kanjiData = [];
                Object.keys(raw).forEach(level => {
                    raw[level].forEach(item => {
                        kanjiData.push({ kanji: item.c, hv: item.hv, meaning: item.m_vi });
                    });
                });
                renderGarden();
                renderSeedList();
                updateUI();
            } catch (e) { console.error('lỗi nạp dữ liệu'); }
        }

        function updateUI() {
            document.getElementById('sumi-coin-balance').innerText = sumiCoins.toLocaleString();
            document.getElementById('exp-val').innerText = sumiExp;
            document.getElementById('level-val').innerText = sumiLevel;
            document.getElementById('exp-fill').style.width = sumiExp + "%";
            localStorage.setItem('sumi_coin_balance', sumiCoins);
            localStorage.setItem('sumi_garden_plots', JSON.stringify(gardenPlots));
            localStorage.setItem('sumi_exp', sumiExp);
            localStorage.setItem('sumi_level', sumiLevel);
        }

        function renderGarden() {
            const container = document.getElementById('garden-view');
            container.innerHTML = "";
            for (let i = 0; i < 9; i++) {
                const plot = document.createElement('div');
                plot.className = 'plot';
                if (gardenPlots[i]) {
                    const char = gardenPlots[i];
                    plot.onclick = () => {
                        const item = kanjiData.find(d => d.kanji === char) || {hv:'?', meaning:'?'};
                        openModal(item, i);
                    };
                    plot.innerHTML = `<div class="kanji-main">${char}</div>`;
                } else { plot.innerHTML = `<div style="opacity:0.2; font-size:2rem;">🌱</div>`; }
                container.appendChild(plot);
            }
        }

        function renderSeedList() {
            const container = document.getElementById('seed-container');
            container.innerHTML = "";
            kanjiData.forEach(item => {
                const div = document.createElement('div');
                div.className = 'seed-item';
                div.onclick = () => plantKanji(item.kanji);
                div.innerHTML = `<div class="k-char">${item.kanji}</div><div class="k-hv">${item.hv}</div>`;
                container.appendChild(div);
            });
        }

        function plantKanji(char) {
            if (sumiCoins < 10) { alert('hết coin rồi cậu ơi!'); return; }
            if (gardenPlots.length < 9) {
                sumiCoins -= 10; gardenPlots.push(char);
                updateUI(); renderGarden();
                // Tự cuộn lên đầu khi trồng
                window.scrollTo({top: 0, behavior: 'smooth'});
            } else { alert('vườn đầy rồi!'); }
        }

        function harvestKanji() {
            if (currentHarvestingIndex > -1) {
                gardenPlots.splice(currentHarvestingIndex, 1);
                sumiCoins += 10;
                sumiExp += 20; 
                if (sumiExp >= 100) { sumiLevel += 1; sumiExp = 0; alert('LEVEL UP! 🎉'); }
                updateUI(); renderGarden(); closeModal();
            }
        }

        function showView(v) {
            const gardenView = document.getElementById('garden-view');
            const seedsView = document.getElementById('seeds-view');
            const btnGarden = document.getElementById('btn-garden');
            const btnSeeds = document.getElementById('btn-seeds');

            if (v === 'garden') {
                gardenView.style.display = 'grid';
                seedsView.style.display = 'none';
                btnGarden.classList.add('active');
                btnSeeds.classList.remove('active');
            } else {
                gardenView.style.display = 'none';
                seedsView.style.display = 'flex';
                btnGarden.classList.remove('active');
                btnSeeds.classList.add('active');
                // Khi mở kho hạt, cuộn nhẹ xuống vùng kho
                setTimeout(() => seedsView.scrollIntoView({behavior: 'smooth'}), 100);
            }
        }

        function openModal(item, idx) {
            currentHarvestingIndex = idx;
            document.getElementById('m-hv').innerText = item.hv;
            document.getElementById('m-kanji').innerText = item.kanji;
            document.getElementById('m-meaning').innerText = item.meaning;
            document.getElementById('modal-review').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal-review').style.display = 'none'; }
        window.onload = loadData;
        window.onclick = (e) => { if (e.target.className === 'modal') closeModal(); }
    </script>
</body>
</html>
