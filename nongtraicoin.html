<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>nông trại kanji - sumi ai</title>
    <style>
        :root {
            --bg: #e0e7d8;
            --sidebar: #f8f1e5;
            --grass: #a5d6a7;
            --soil: #795548;
            --dark: #333333;
            --white: #ffffff;
            --accent: #ffb74d;
            --exp: #ba68c8;
            --kanji-red: #a63d40;
            --sumi-gold: #f39c12;
        }

        * { 
            box-sizing: border-box; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            font-weight: bold; 
            text-transform: lowercase; 
            margin: 0; padding: 0; 
        }

        body { 
            background-color: var(--bg); 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
            color: var(--dark); 
        }

        /* --- SIDEBAR --- */
        .sidebar { 
            width: 280px; background: var(--sidebar); border-right: 6px solid var(--dark); 
            display: flex; flex-direction: column; padding: 25px; gap: 20px; z-index: 10; 
        }
        
        .char-frame {
            background: var(--white); border: 6px solid var(--dark); border-radius: 35px;
            padding: 20px; text-align: center; box-shadow: 0 8px 0 var(--dark); position: relative;
        }

        .avatar-main {
            width: 80px; height: 80px; background: #ffccbc; margin: 0 auto 12px;
            border-radius: 50%; border: 5px solid var(--dark); font-size: 2.5rem;
            display: flex; align-items: center; justify-content: center;
        }

        .exp-bar {
            width: 100%; height: 16px; background: #eee; border-radius: 10px;
            border: 3px solid var(--dark); margin-top: 15px; overflow: hidden;
        }
        #exp-fill { width: 10%; height: 100%; background: var(--exp); transition: 0.5s; }

        .nav-menu { display: flex; flex-direction: column; gap: 15px; }
        .nav-btn { 
            background: var(--white); border: 6px solid var(--dark); border-radius: 22px; 
            padding: 15px; cursor: pointer; display: flex; align-items: center; gap: 12px; 
            box-shadow: 0 6px 0 var(--dark); transition: 0.1s; width: 100%; justify-content: center;
        }
        .nav-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--dark); }
        .nav-btn.active { background: var(--accent); color: white; }

        /* --- MAIN AREA --- */
        .main-game { flex: 1; padding: 30px; display: flex; flex-direction: column; gap: 20px; position: relative; }
        
        .top-stats { display: flex; justify-content: flex-end; gap: 15px; align-items: center; }
        
        .coin-box {
            background: white; padding: 8px 20px; border: 4px solid var(--dark);
            border-radius: 20px; box-shadow: 0 5px 0 var(--dark);
            display: flex; align-items: center; gap: 10px; font-size: 1.2rem;
        }
        

        .sumi-coin-img { width: 35px; height: 35px; animation: coin-rotate 4s infinite linear; }
        @keyframes coin-rotate {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        /* Ảnh đồng coin chữ S Nổi Bật */
        .sumi-coin-img { width: 32px; height: 32px; animation: coin-float 3s infinite ease-in-out; }
        @keyframes coin-float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-5px) rotate(10deg); } }

        /* VÙNG CỎ */
        .display-area { 
            flex: 1; background: var(--grass); border: 8px solid var(--dark); 
            border-radius: 50px; padding: 30px; display: flex; 
            justify-content: center; align-items: center; position: relative; 
            box-shadow: inset 0 0 50px rgba(0,0,0,0.1);
        }

        .garden-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: clamp(10px, 3vw, 30px); 
            width: 100%; max-width: 800px;
        }

        .plot { 
            background: var(--soil); border: 6px solid #4e342e; border-radius: 35px; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; box-shadow: inset 0 -12px 0 rgba(0,0,0,0.3), 0 5px 15px rgba(0,0,0,0.2); 
            transition: 0.2s; aspect-ratio: 1/1; width: 100%;
        }

        .kanji-main { 
            width: 80%; height: 80%; background: white; border: 5px solid var(--dark); 
            border-radius: 25px; display: flex; align-items: center; justify-content: center; 
            font-size: clamp(2rem, 8vw, 4rem); box-shadow: 0 6px 0 var(--dark);
            animation: grow 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* KHO HẠT GIỐNG */
        .overlay-panel {
            position: absolute; inset: 15px; background: #fff9c4; 
            border: 8px solid var(--dark); border-radius: 40px; display: none; 
            flex-direction: column; padding: 25px; z-index: 20; 
            max-height: calc(100% - 30px);
        }

        .seed-list {
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 15px; padding: 10px;
            overflow-y: auto !important; 
            flex: 1; 
            -webkit-overflow-scrolling: touch; 
        }

        .seed-item {
            background: white; border: 4px solid var(--dark); border-radius: 20px; 
            padding: 15px; text-align: center; cursor: pointer; box-shadow: 0 5px 0 var(--dark);
        }

        /* MOBILE RESPONSIVE */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 6px solid var(--dark); padding: 10px; }
            .char-frame { display: none; }
            .nav-menu { flex-direction: row; justify-content: center; gap: 8px; }
            .nav-btn { padding: 10px; font-size: 0.85rem; border-width: 4px; border-radius: 15px; box-shadow: 0 4px 0 var(--dark); }
            .main-game { padding: 15px; }
            .display-area { border-radius: 35px; padding: 20px; border-width: 6px; }
            .garden-grid { grid-template-columns: repeat(2, 1fr); max-width: 400px; }
            .seed-list { grid-template-columns: repeat(3, 1fr); }
            .seed-item { padding: 10px; aspect-ratio: 1/1.2; }
        }

        @keyframes grow { 0% { transform: scale(0); } 100% { transform: scale(1); } }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: #fdf5e6; border: 10px solid var(--dark); border-radius: 50px; padding: 30px; width: 90%; max-width: 450px; text-align: center; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="char-frame">
            <div class="avatar-main">🤖</div>
            <div style="font-size: 1.1rem;">sumi bot</div>
            <div class="exp-bar"><div id="exp-fill"></div></div>
        </div>
        <nav class="nav-menu">
            <button class="nav-btn active" onclick="showView('garden')">🏡 vườn</button>
            <button class="nav-btn" onclick="showView('seeds')">🌱 hạt giống</button>
        </nav>
    </aside>

    <main class="main-game">
        <div class="top-stats">
            <div class="coin-box">
                <img class="sumi-coin-img" src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgdmlld0JveD0iMCAwIDEwMCAxMDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+CiAgPGNpcmNsZSBjeD0iNTAiIGN5PSI1NCIgcj0iNDYiIGZpbGw9IiMzMzMzMzMiLz4KICA8Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSI0NiIgZmlsbD0iI2ZmYjc0ZCIgc3Ryb2tlPSIjMzMzMzMzIiBzdHJva2Utd2lkdGg9IjgiLz4KICA8Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSIzMCIgZmlsbD0id2hpdGUiIHN0cm9rZT0iIzMzMzMzMyIgc3Ryb2tlLXdpZHRoPSI0Ii8+CiAgPHBhdGggZD0iTTQyIDM4QzQyIDM0IDU4IDM0IDU4IDQzQzU4IDUwIDQyIDQ3IDQyIDU1QzQyIDY1IDU4IDY1IDU4IDYxIiBzdHJva2U9IiNhNjNkNDAiIHN0cm9rZS13aWR0aD0iMTAiIHN0cm9rZS1saW5lY2FwPSJyb3VuZCIgc3Ryb2tlLWxpbmVqb2luPSJyb3VuZCIvPgogIDxwYXRoIGQ9Ik0zNCAzMEMyOCAzNCAyOCA0NCAzNCA1MCIgc3Ryb2tlPSJ3aGl0ZSIgc3Ryb2tlLXdpZHRoPSI0IiBzdHJva2UtbGluZWNhcD0icm91bmQiIG9wYWNpdHk9IjAuNSIvPgo8L3N2Zz4=">
                <span id="sumi-coin-balance">0</span>
            </div>
        </div>

        <div class="display-area">
            <div id="garden-view" class="garden-grid"></div>
            <div id="seeds-view" class="overlay-panel">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <h2>🌱 kho hạt giống</h2>
                    <button onclick="showView('garden')" style="border:none; background:none; cursor:pointer; font-size:2rem;">✖</button>
                </div>
                <div class="seed-list" id="seed-container"></div>
            </div>
        </div>
    </main>

    <div id="modal-review" class="modal">
        <div class="modal-content">
            <h2 id="m-hv" style="color: var(--kanji-red); font-size: 2rem;">âm hán</h2>
            <div class="big-kanji" id="m-kanji" style="font-size: 6rem; font-weight: 900; background: white; border: 5px solid var(--dark); border-radius: 30px; margin: 15px 0;">?</div>
            <p id="m-meaning" style="font-size: 1.3rem;">ý nghĩa...</p>
            <button class="nav-btn" style="background:var(--kanji-red); color:white; margin-top:25px;" onclick="harvestKanji()">🧺 thu hoạch (+10 🪙)</button>
        </div>
    </div>

    <script>
        let kanjiData = []; 
        let gardenPlots = JSON.parse(localStorage.getItem('sumi_garden_plots')) || ["日", "本"];
        let sumiCoins = parseInt(localStorage.getItem('sumi_coin_balance')) || 100;
        let currentHarvestingIndex = -1;

        async function loadData() {
            try {
                const response = await fetch('data.json'); 
                const rawData = await response.json();
                kanjiData = [];
                Object.keys(rawData).forEach(level => {
                    rawData[level].forEach(item => {
                        kanjiData.push({ kanji: item.c, hv: item.hv, meaning: item.m_vi });
                    });
                });
                renderGarden();
                renderSeedList();
                updateUI();
            } catch (error) { console.error('lỗi dữ liệu json'); }
        }

        function updateUI() {
            document.getElementById('sumi-coin-balance').innerText = sumiCoins.toLocaleString();
            localStorage.setItem('sumi_coin_balance', sumiCoins);
            localStorage.setItem('sumi_garden_plots', JSON.stringify(gardenPlots));
        }

        function renderGarden() {
            const container = document.getElementById('garden-view');
            container.innerHTML = "";
            for (let i = 0; i < 6; i++) {
                const plot = document.createElement('div');
                plot.className = 'plot';
                if (gardenPlots[i]) {
                    const char = gardenPlots[i];
                    const item = kanjiData.find(d => d.kanji === char) || {hv:'?', meaning:'?'};
                    plot.onclick = () => openModal(item, i);
                    plot.innerHTML = `<div class="kanji-main">${char}</div>`;
                } else { plot.innerHTML = `<div style="opacity:0.2; font-size:3rem;">🌱</div>`; }
                container.appendChild(plot);
            }
        }

        function renderSeedList() {
            const container = document.getElementById('seed-container');
            container.innerHTML = "";
            kanjiData.forEach(item => {
                const div = document.createElement('div');
                div.className = 'seed-item';
                div.onclick = () => plantKanji(item.kanji);
                div.innerHTML = `<div style="font-size:2rem;">${item.kanji}</div><div style="font-size:0.7rem; color:var(--kanji-red);">${item.hv}</div>`;
                container.appendChild(div);
            });
        }

        function plantKanji(char) {
            if (sumiCoins < 5) { alert('không đủ coin!'); return; }
            if (gardenPlots.length < 6) {
                sumiCoins -= 5;
                gardenPlots.push(char);
                updateUI(); renderGarden(); showView('garden');
            } else { alert('vườn đầy rồi!'); }
        }

        function harvestKanji() {
            if (currentHarvestingIndex > -1) {
                gardenPlots.splice(currentHarvestingIndex, 1);
                sumiCoins += 10;
                let w = parseInt(document.getElementById('exp-fill').style.width) || 10;
                if(w < 100) document.getElementById('exp-fill').style.width = (w + 10) + "%";
                updateUI(); renderGarden(); closeModal();
            }
        }

        function showView(v) {
            const garden = document.getElementById('garden-view');
            const seeds = document.getElementById('seeds-view');
            if (v === 'garden') {
                garden.style.display = 'grid'; seeds.style.display = 'none';
            } else {
                garden.style.display = 'none'; seeds.style.display = 'flex';
                document.getElementById('seed-container').scrollTop = 0;
            }
            const btns = document.querySelectorAll('.nav-btn');
            btns.forEach(b => b.classList.remove('active'));
            if(v === 'garden') btns[0].classList.add('active'); else btns[1].classList.add('active');
        }

        function openModal(item, idx) {
            currentHarvestingIndex = idx;
            document.getElementById('m-hv').innerText = item.hv;
            document.getElementById('m-kanji').innerText = item.kanji;
            document.getElementById('m-meaning').innerText = item.meaning;
            document.getElementById('modal-review').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal-review').style.display = 'none'; }
        window.onload = loadData;
        window.onclick = (e) => { if (e.target.className === 'modal') closeModal(); }
    </script>
</body>
</html>
