<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>nông trại kanji - sumi ai</title>
    <style>
        :root {
            --bg: #e0e7d8;
            --sidebar: #f8f1e5;
            --grass: #a5d6a7;
            --soil: #795548;
            --dark: #333333;
            --white: #ffffff;
            --accent: #ffb74d;
            --exp: #ba68c8;
            --kanji-red: #a63d40;
            --sumi-gold: #f39c12;
        }

        * { 
            box-sizing: border-box; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            font-weight: bold; 
            text-transform: lowercase; 
            margin: 0; padding: 0; 
        }

        body { background-color: var(--bg); display: flex; height: 100vh; overflow: hidden; color: var(--dark); }

        /* --- sidebar --- */
        .sidebar { 
            width: 260px; background: var(--sidebar); border-right: 6px solid var(--dark); 
            display: flex; flex-direction: column; padding: 20px; gap: 15px; z-index: 10; 
        }
        
        .char-frame {
            background: var(--white); border: 5px solid var(--dark); border-radius: 30px;
            padding: 15px; text-align: center; box-shadow: 0 6px 0 var(--dark); position: relative;
        }

        .avatar-main {
            width: 70px; height: 70px; background: #ffccbc; margin: 0 auto 10px;
            border-radius: 50%; border: 4px solid var(--dark); font-size: 2.5rem;
            display: flex; align-items: center; justify-content: center;
        }

        .lv-tag {
            position: absolute; bottom: 10px; right: 10px; background: var(--accent);
            padding: 2px 10px; border-radius: 12px; border: 3px solid var(--dark);
            font-size: 0.8rem; color: white;
        }

        .exp-bar {
            width: 100%; height: 14px; background: #eee; border-radius: 10px;
            border: 3px solid var(--dark); margin-top: 10px; overflow: hidden;
        }
        #exp-fill { width: 20%; height: 100%; background: var(--exp); transition: 0.5s; }

        .nav-menu { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }
        .nav-btn { 
            background: var(--white); border: 4px solid var(--dark); border-radius: 20px; 
            padding: 12px; cursor: pointer; display: flex; align-items: center; gap: 10px; 
            box-shadow: 0 5px 0 var(--dark); transition: 0.1s; width: 100%;
        }
        .nav-btn:active { transform: translateY(3px); box-shadow: 0 2px 0 var(--dark); }
        .nav-btn.active { background: var(--accent); color: white; }

        /* --- main game area --- */
        .main-game { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 15px; position: relative; }
        
        .top-stats { display: flex; justify-content: flex-end; gap: 12px; align-items: center; }
        
        .coin-box {
            background: white; padding: 8px 15px; border: 4px solid var(--dark);
            border-radius: 20px; box-shadow: 0 4px 0 var(--dark);
            display: flex; align-items: center; gap: 8px;
        }

        .sumi-coin-img {
            width: 28px; height: 28px;
            filter: drop-shadow(0 2px 0 rgba(0,0,0,0.1));
            animation: coin-float 3s infinite ease-in-out;
        }

        @keyframes coin-float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-3px) rotate(5deg); }
        }

        .display-area { 
            flex: 1; background: var(--grass); border: 6px solid var(--dark); 
            border-radius: 40px; padding: 20px; display: flex; 
            justify-content: center; align-items: center; position: relative; 
            box-shadow: inset 0 0 40px rgba(0,0,0,0.1); overflow: hidden;
        }

        .garden-grid { 
            display: grid; 
            grid-template-columns: repeat(3, minmax(100px, 150px)); 
            grid-template-rows: repeat(2, minmax(100px, 150px)); 
            gap: 20px; 
        }

        .plot { 
            background: var(--soil); border: 5px solid #4e342e; border-radius: 25px; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; box-shadow: inset 0 -8px 0 rgba(0,0,0,0.3); transition: 0.2s; 
        }
        .plot:hover { transform: scale(1.05); }

        .kanji-main { 
            width: 80%; height: 80%; background: white; border: 4px solid var(--dark); 
            border-radius: 18px; display: flex; align-items: center; justify-content: center; 
            font-size: clamp(2rem, 5vw, 3.5rem); animation: grow 0.4s ease-out;
        }

        @keyframes grow { 0% { transform: scale(0); } 100% { transform: scale(1); } }

        .overlay-panel {
            position: absolute; width: 90%; height: 90%; background: #fff9c4; 
            border: 6px solid var(--dark); border-radius: 35px; display: none; 
            flex-direction: column; padding: 20px; z-index: 20;
        }

        .seed-list {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 15px; overflow-y: auto; padding: 10px;
        }

        .seed-item {
            background: white; border: 3px solid var(--dark); border-radius: 15px; 
            padding: 10px; text-align: center; cursor: pointer; box-shadow: 0 4px 0 var(--dark);
        }

        /* --- modal --- */
        .modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.7); 
            display: none; justify-content: center; align-items: center; z-index: 100; 
        }
        .modal-content { 
            background: #fdf5e6; border: 8px solid var(--dark); border-radius: 40px; 
            padding: 30px; width: 90%; max-width: 400px; text-align: center; 
        }
        .big-kanji { 
            font-size: 5rem; background: white; border: 5px solid var(--dark); 
            border-radius: 30px; margin: 20px 0; padding: 10px;
        }

        /* mobile --- */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 6px solid var(--dark); padding: 10px; }
            .nav-menu { flex-direction: row; }
            .char-frame { display: none; }
            .garden-grid { grid-template-columns: repeat(2, 1fr); grid-template-rows: repeat(3, 1fr); gap: 10px; }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="char-frame">
            <div class="avatar-main">🤖</div>
            <div style="font-size: 1rem;">sumi bot</div>
            <div class="lv-tag">lv.1</div>
            <div class="exp-bar"><div id="exp-fill"></div></div>
        </div>
        <nav class="nav-menu">
            <button class="nav-btn active" onclick="showView('garden')">🏡 vườn</button>
            <button class="nav-btn" onclick="showView('seeds')">🌱 hạt giống</button>
        </nav>
    </aside>

    <main class="main-game">
        <div class="top-stats">
            <div class="coin-box">
                <img class="sumi-coin-img" src="data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgdmlld0JveD0iMCAwIDEwMCAxMDAiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+CiAgPGNpcmNsZSBjeD0iNTAiIGN5PSI1NCIgcj0iNDYiIGZpbGw9IiM3OTU1NDgiLz4KICA8Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSI0NiIgZmlsbD0iI2ZmYjc0ZCIgc3Ryb2tlPSIjMzMzMzMzIiBzdHJva2Utd2lkdGg9IjgiLz4KICA8Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSIzNCIgc3Ryb2tlPSIjMzMzMzMzIiBzdHJva2Utd2lkdGg9IjIiIHN0cm9rZS1kYXNoYXJyYXk9IjQgNCIvPgogIDxwYXRoIGQ9Ik00MCAzNUM0MCAzMCA2MCAzMCA2MCA0MEM2MCA1MCA0MCA1MCA0MCA2MEM0MCA3MCA2MCA3MCA2MCA2NSIgc3Ryb2tlPSIjMzMzMzMzIiBzdHJva2Utd2lkdGg9IjEwIiBzdHJva2UtbGluZWNhcD0icm91bmQiLz4KICA8cGF0aCBkPSJNMzUgMzBDMzAgMzUgMzAgNDUgMzUgNTAiIHN0cm9rZT0id2hpdGUiIHN0cm9rZS13aWR0aD0iNCIgc3Ryb2tlLWxpbmVjYXA9InJvdW5kIiBvcGFjaXR5PSIwLjUiLz4KPC9zdmc+">
                <span id="sumi-coin-balance">0</span>
            </div>
            <div class="coin-box" style="border-color: #ba68c8; color: #ba68c8;">💎 0</div>
        </div>

        <div class="display-area">
            <div id="garden-view" class="garden-grid"></div>
            <div id="seeds-view" class="overlay-panel">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <h2>🌱 kho hạt giống</h2>
                    <button onclick="showView('garden')" style="border:none; background:none; cursor:pointer; font-size:1.5rem;">✖</button>
                </div>
                <div class="seed-list" id="seed-container"></div>
            </div>
        </div>
    </main>

    <div id="modal-review" class="modal">
        <div class="modal-content">
            <h2 id="m-hv" style="color: var(--kanji-red);">âm hán</h2>
            <div class="big-kanji" id="m-kanji">?</div>
            <p id="m-meaning">ý nghĩa...</p>
            <button class="nav-btn" style="background:var(--kanji-red); color:white; justify-content:center; margin-top:20px;" onclick="harvestKanji()">🧺 thu hoạch (+10 🪙)</button>
        </div>
    </div>

    <script>
        let kanjiData = []; 
        let gardenPlots = ["日", "本"];
        let currentHarvestingIndex = -1;
        let sumiCoins = parseInt(localStorage.getItem('sumi_coin_balance')) || 100;

        async function loadData() {
            try {
                const response = await fetch('data.json'); 
                const rawData = await response.json();
                kanjiData = [];
                Object.keys(rawData).forEach(level => {
                    rawData[level].forEach(item => {
                        kanjiData.push({ kanji: item.c, hv: item.hv, meaning: item.m_vi });
                    });
                });
                renderGarden();
                renderSeedList();
                updateUI();
            } catch (error) { console.error('lỗi tải dữ liệu'); }
        }

        function updateUI() {
            document.getElementById('sumi-coin-balance').innerText = sumiCoins.toLocaleString();
            localStorage.setItem('sumi_coin_balance', sumiCoins);
        }

        function renderGarden() {
            const container = document.getElementById('garden-view');
            container.innerHTML = "";
            for (let i = 0; i < 6; i++) {
                const plot = document.createElement('div');
                plot.className = 'plot';
                if (gardenPlots[i]) {
                    const char = gardenPlots[i];
                    const item = kanjiData.find(d => d.kanji === char);
                    plot.onclick = () => openModal(item, i);
                    plot.innerHTML = `<div class="kanji-main">${char}</div>`;
                } else { plot.innerHTML = `<div style="opacity:0.2;">🌱</div>`; }
                container.appendChild(plot);
            }
        }

        function renderSeedList() {
            const container = document.getElementById('seed-container');
            container.innerHTML = "";
            kanjiData.forEach(item => {
                const div = document.createElement('div');
                div.className = 'seed-item';
                div.onclick = () => plantKanji(item.kanji);
                div.innerHTML = `<div>${item.kanji}</div><div style="font-size:0.7rem; color:var(--kanji-red);">${item.hv}</div>`;
                container.appendChild(div);
            });
        }

        function plantKanji(char) {
            if (sumiCoins < 5) { alert('không đủ coin!'); return; }
            if (gardenPlots.length < 6) {
                sumiCoins -= 5;
                gardenPlots.push(char);
                updateUI(); renderGarden(); showView('garden');
            } else { alert('vườn đầy!'); }
        }

        function harvestKanji() {
            if (currentHarvestingIndex > -1) {
                gardenPlots.splice(currentHarvestingIndex, 1);
                sumiCoins += 10;
                // Tăng EXP
                const fill = document.getElementById('exp-fill');
                let w = parseInt(fill.style.width) || 20;
                if(w < 100) fill.style.width = (w + 10) + "%";
                
                updateUI(); renderGarden(); closeModal();
            }
        }

        function showView(v) {
            document.getElementById('garden-view').style.display = (v === 'garden') ? 'grid' : 'none';
            document.getElementById('seeds-view').style.display = (v === 'seeds') ? 'flex' : 'none';
        }

        function openModal(item, idx) {
            currentHarvestingIndex = idx;
            document.getElementById('m-hv').innerText = item.hv;
            document.getElementById('m-kanji').innerText = item.kanji;
            document.getElementById('m-meaning').innerText = item.meaning;
            document.getElementById('modal-review').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal-review').style.display = 'none'; }
        window.onload = loadData;
        window.onclick = (e) => { if (e.target.className === 'modal') closeModal(); }
    </script>
</body>
</html>
