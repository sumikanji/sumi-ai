<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sumi AI - Kanji Mastery Ultimate</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Klee+One:wght@300;400&family=Noto+Serif+JP:wght@200;300&display=swap" rel="stylesheet"> <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400&family=Kiwi+Maru:wght@300&display=swap" rel="stylesheet"><link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400&family=Kiwi+Maru:wght@300;400&family=Zen+Maru+Gothic:wght@300;400&display=swap" rel="stylesheet"><link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@100;300;400&family=Noto+Sans+JP:wght@100;300&family=Noto+Serif+JP:wght@200;300&display=swap" rel="stylesheet"><link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;700&family=Hina+Mincho&family=Zen+Maru+Gothic:wght@500;700&family=IBM+Plex+Sans+JP:wght@500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <style>
        :root {
            --muji-bg: #fdfaf5;
            --muji-red: #a63d40;
            --muji-text: #333333;
            --gray-border: #e8e8e8;
            --gray-cell: #f5f5f5;
            --current-font: 'Klee One', serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            background-color: var(--muji-bg);
            display: flex; flex-direction: column; align-items: center;
            padding: 20px; color: var(--muji-text);
        }

        /* --- LAYOUT CHIA CỘT --- */
        .main-layout {
            display: flex; gap: 30px; width: 100%; max-width: 1100px;
            margin-top: 20px; align-items: flex-start;
        }
        .left-side { flex: 1.5; display: flex; flex-direction: column; gap: 15px; }
        .right-side { flex: 1; display: flex; flex-direction: column; gap: 15px; position: sticky; top: 20px; }

        /* --- BOT AREA --- */
        .bot-container { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; min-height: 180px; justify-content: flex-end; }
        #sumi-robot { width: 120px; height: 120px; position: relative; animation: floatingSumi 3s ease-in-out infinite; }
        @keyframes floatingSumi { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        .bot-bubble {
            background: white; padding: 12px 20px; border-radius: 20px; border: 1px solid var(--gray-border); 
            font-size: 15px; font-weight: 600; margin-top: 10px; width: 100%; max-width: 420px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); color: var(--muji-red); text-align: center;
        }
/* Khung chứa các nút cấp độ */
.level-selection { 
    display: flex; 
    gap: 15px; /* Tăng khoảng cách dãn cách giữa các nút */
    justify-content: center; 
    flex-wrap: wrap; 
    padding: 10px 0;
}
/* Thêm vào thẻ <style> */
.hv-label.hidden {
    display: none !important;
}

/* Tùy chỉnh nút khi ở trạng thái khác */
.btn-feature.active-toggle {
    background: var(--muji-red);
    color: white;
}
/* Nút cấp độ to hơn */
.l-btn {
    background: var(--gray-cell); 
    border: 1px solid var(--gray-border); 
    width: 60px;  /* Tăng từ 45px lên 60px */
    height: 60px; /* Tăng từ 45px lên 60px */
    border-radius: 15px; /* Bo góc mềm mại hơn */
    font-size: 16px;     /* Chữ to hơn một chút */
    cursor: pointer; 
    transition: 0.3s; 
    font-weight: 800; 
    color: #888;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Hiệu ứng khi di chuột vào hoặc khi đang kích hoạt */
.l-btn:hover {
    border-color: var(--muji-red);
    color: var(--muji-red);
}

.l-btn.active { 
    background: var(--muji-red); 
    color: white; 
    border-color: var(--muji-red);
    box-shadow: 0 4px 12px rgba(166, 61, 64, 0.2); /* Thêm bóng đổ cho nút đang chọn */
}
        /* --- COMPONENTS --- */
        .level-card { width: 100%; background: white; padding: 15px; border-radius: 20px; border: 1px solid var(--gray-border); text-align: center; }
        .l-btn { background: var(--gray-cell); border: 1px solid var(--gray-border); width: 45px; height: 45px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .l-btn.active { background: var(--muji-red); color: white; }

        .feature-row { display: flex; gap: 10px; width: 100%; }
        .btn-feature {
            flex: 1; padding: 12px; border-radius: 12px; border: 1px solid var(--muji-red);
            background: white; color: var(--muji-red); font-weight: 700; cursor: pointer; transition: 0.3s; text-transform: uppercase; font-size: 11px;
        }
        .btn-feature:hover { background: var(--muji-red); color: white; }

        .btn-search-full {
            width: 100%; background: white; color: var(--muji-red); border: 1px solid var(--muji-red);
            padding: 14px; border-radius: 15px; font-weight: 800; cursor: pointer; transition: 0.3s; text-transform: uppercase;
        }
        .btn-search-full:hover { background: var(--muji-red); color: white; }
/* 1. Cố định toàn bộ phần phía trên (Bot và Level Selection) */
.top-sticky-area {
    position: sticky;
    top: 0;
    z-index: 1000;
    background-color: var(--muji-bg); /* Trùng màu nền để không bị lộ khi cuộn */
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-bottom: 10px;
      /* 2. Giới hạn chiều cao của khung chứa Kanji và cho phép cuộn */
.master-box {
    background: white;
    border: 1px solid var(--gray-border);
    border-radius: 25px;
    padding: 20px;
    
    /* Thiết lập chiều cao tối đa (ví dụ 500px hoặc theo màn hình) */
    max-height: 65vh; 
    overflow-y: auto; /* Hiện thanh cuộn khi vượt quá chiều cao */
    
    /* Làm đẹp thanh cuộn theo phong cách tối giản */
    scrollbar-width: thin;
    scrollbar-color: var(--muji-red) transparent;
}

/* Tùy chỉnh thanh cuộn cho Chrome/Safari */
.master-box::-webkit-scrollbar {
    width: 6px;
}
.master-box::-webkit-scrollbar-thumb {
    background-color: var(--muji-red);
    border-radius: 10px;
}
}
        .kanji-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(55px, 1fr)); gap: 12px; }
        /* Ô chứa chữ */
.kanji-cell {
    aspect-ratio: 1/1; 
    background: var(--gray-cell); 
    border-radius: 12px;
    display: flex; 
    flex-direction: column; /* Xếp theo chiều dọc */
    align-items: center; 
    justify-content: center; 
    cursor: pointer;
    transition: 0.3s; 
    border: 2px solid transparent;
    padding: 2px;
}

/* Chữ Kanji/Bộ thủ chính */
.kanji-char {
    font-family: var(--current-font);
    font-size: 24px; /* Chỉnh lại kích cỡ vừa vặn */
    line-height: 1.2;
}
/* Danh sách Kanji có cùng bộ thủ (hiển thị trong bảng chi tiết bên phải) */
.related-kanji-container {
    margin-top: 15px;
    padding-top: 10px;
    border-top: 1px solid #f0f0f0;
    text-align: left;
}

.related-title {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 300;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
}

.related-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
}

.related-item {
    font-family: 'Klee One', cursive;
    font-size: 18px;
    color: #444;
    cursor: pointer;
    transition: 0.2s;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    background: #f9f9f9;
}

.related-item:hover {
    color: var(--muji-red);
    background: #fffafa;
}
/* Âm Hán Việt bên dưới */
.hv-label {
    font-size: 9px; 
    font-weight: 700;
    color: #999;
    text-transform: uppercase;
    margin-top: 1px;
    font-family: 'Be Vietnam Pro', sans-serif;
    white-space: nowrap; /* Không cho xuống dòng */
    overflow: hidden;
    max-width: 90%;
    text-overflow: ellipsis; /* Nếu dài quá sẽ hiện dấu ... */
}

/* Đổi màu khi được chọn */
.kanji-cell.selected { background: var(--muji-red) !important; color: white !important; }
.kanji-cell.selected .hv-label { color: rgba(255,255,255,0.8); }
.kanji-cell.viewing { border-color: var(--muji-red); }

        .preview-card {
            background: white; border-radius: 30px; padding: 25px; width: 100%;
            display: flex; flex-direction: column; align-items: center;
            border: 1px solid var(--gray-border); box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }
        #writer-canvas { width: 160px; height: 160px; margin-bottom: 15px; }
        .hv-tag { font-size: 24px; font-weight: 700; color: var(--muji-red); letter-spacing: 3px; }
        .reading-grid { display: flex; width: 100%; justify-content: space-around; padding: 15px 0; border-top: 1px solid #eee; margin-top: 15px; }
        .vocab-item { background: var(--gray-cell); padding: 10px; border-radius: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; width: 100%; font-size: 14px; }

        /* --- MODAL TRA CỨU --- */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; padding: 25px; border-radius: 25px; width: 95%; max-width: 550px;
            position: relative; text-align: center;
        }
        #hw-canvas-modal {
            width: 100%; height: 350px; border: 2px solid var(--gray-border); border-radius: 15px;
            background-color: #fff; cursor: crosshair; touch-action: none;
            background-image: linear-gradient(var(--gray-border) 1px, transparent 1px), linear-gradient(90deg, var(--gray-border) 1px, transparent 1px);
            background-size: 50px 50px;
        }
        .prediction-row { 
            display: flex; gap: 8px; overflow-x: auto; margin-bottom: 15px; 
            min-height: 60px; justify-content: center; padding: 5px;
            border-bottom: 1px solid #eee;
        }

        @media (max-width: 800px) { .main-layout { flex-direction: column; } .right-side { position: static; } }
    </style>
</head>

            <svg viewBox="0 0 100 100"><rect x="10" y="20" width="80" height="60" rx="30" fill="white" stroke="#e0e0e0" stroke-width="1.5"/><rect x="22" y="32" width="56" height="36" rx="18" fill="#333"/><circle cx="38" cy="50" r="5" fill="#00ffcc"/><circle cx="62" cy="50" r="5" fill="#00ffcc"/><path d="M50 20 L50 5" stroke="#a63d40" stroke-width="4" stroke-linecap="round"/><circle cx="50" cy="5" r="7" fill="#a63d40"/></svg>

    <div class="main-layout">
        <div class="left-side">
            <div class="level-card">
         
        <span style="font-size: 14px; font-weight: 500; color: #888888; display: block; margin-bottom: 5px; letter-spacing: 0.5px;">
        Chọn chế độ luyện tập

    <button class="btn-feature" onclick="selectAllInGrid()">Chọn / Bỏ chọn tất cả</button>

                        <div id="related-section" class="related-kanji-container" style="display:none;">
    <div class="related-title">Chữ Kanji cùng bộ thủ</div>

    </div>
</div>
    <div id="hw-modal" class="modal-overlay">
        <div class="modal-content">
            <span onclick="closeModal()" style="position:absolute; top:10px; right:20px; font-size:35px; cursor:pointer; color:#999;">&times;</span>
            <h4 style="margin-bottom: 10px; color: var(--muji-red); text-transform: uppercase; letter-spacing: 1px;">Vẽ chữ vào khung</h4>

                <span style="color:#ccc; font-style:italic; font-size:13px; margin-top:15px;">Kết quả sẽ hiện ở đây...</span>

                <button class="btn-feature" style="border-color:#ccc; color:#666" onclick="undoStroke()">Hoàn tác</button>
                <button class="btn-feature" style="background:var(--muji-red); color:white" onclick="closeModal()">Xong</button>
            </div>

    <script>
        let allLevels = {};
        let selectedKanjiData = [];
        window.currentSelectedKanji = "";
// Biến lưu trữ dữ liệu bộ thủ sau khi tải
let boThuData = [];

// Hàm tải file JSON bộ thủ
async function loadBoThu(btn) {
    document.querySelectorAll('.l-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    
    typeText("Đang tải danh sách 214 bộ thủ...");

    try {
        if (boThuData.length === 0) {
            // Sử dụng fetch với đường dẫn tương đối
            const response = await fetch('214_bo_thu_kanji.json');
            
            if (!response.ok) {
                throw new Error(`Không tìm thấy file (Mã lỗi: ${response.status})`);
            }
            
            boThuData = await response.json();
        }
        renderBoThuGrid(boThuData);
    } catch (e) {
        console.error("Lỗi chi tiết:", e);
        typeText("Lỗi 404: Cậu kiểm tra lại tên file JSON trong thư mục nhé!");
        alert("Sumi không thấy file '214_bo_thu_kanji.json'. Cậu hãy chắc chắn đã đặt file này cùng chỗ với file web!");
    }
}
// Biến lưu trạng thái hiện tại (mặc định là đang hiện)
let isHvVisible = true;
function findKanjiByRadical(radicalChar) {
    let results = [];
    
    // Duyệt qua tất cả các cấp độ trong file kanji_data.json
    for (let level in allLevels) {
        allLevels[level].forEach(kanjiItem => {
            // Kiểm tra nếu thông tin bộ thủ của chữ Kanji trùng với radicalChar
            // Lưu ý: Dữ liệu kanji_data.json của bạn cần có thuộc tính radical (bộ thủ)
            if (kanjiItem.r === radicalChar) {
                results.push(kanjiItem);
            }
        });
    }
    return results;
}

// Hàm hiển thị danh sách lọc được lên bảng chi tiết
function displayRelatedKanji(radicalChar) {
    const relatedKanji = findKanjiByRadical(radicalChar);
    const container = document.getElementById('related-section'); // Thêm id này vào HTML bên phải
    const grid = document.getElementById('related-grid');
    
    grid.innerHTML = '';
    
    if (relatedKanji.length > 0) {
        container.style.display = 'block';
        relatedKanji.forEach(item => {
            const span = document.createElement('div');
            span.className = 'related-item';
            span.innerText = item.c;
            span.onclick = () => showDetails(item); // Nhấn vào để xem chi tiết chữ đó
            grid.appendChild(span);
        });
    } else {
        container.style.display = 'none';
    }
}
function toggleHánViệt() {
    isHvVisible = !isHvVisible; // Đảo ngược trạng thái
    
    const btn = document.getElementById('toggle-hv-btn');
    const labels = document.querySelectorAll('.hv-label');
    
    if (isHvVisible) {
        // Trạng thái HIỆN
        labels.forEach(label => label.classList.remove('hidden'));
        btn.innerText = "Ẩn Hán Việt";
        btn.classList.remove('active-toggle');
    } else {
        // Trạng thái ẨN
        labels.forEach(label => label.classList.add('hidden'));
        btn.innerText = "Hiện Hán Việt";
        btn.classList.add('active-toggle');
    }
}
// Hàm hiển thị bộ thủ lên lưới (Grid)
function renderBoThuGrid(data) {
    const grid = document.getElementById('kanji-grid');
    grid.innerHTML = '';
    data.forEach(item => {
        const cell = document.createElement('div');
        cell.className = 'kanji-cell';
        
        const mainChar = item.BO ? item.BO.split(',')[0].trim() : "";
        if (selectedKanjiData.some(s => s.c === mainChar)) cell.classList.add('selected');
        
        // Cấu trúc HTML mới cho bộ thủ (Sử dụng "TEN BO" từ file JSON của bạn)
        cell.innerHTML = `
            <div class="kanji-char">${mainChar}</div>
            <div class="hv-label">${item["TEN BO"] || ''}</div>
        `;

        cell.onclick = () => {
            document.querySelectorAll('.kanji-cell').forEach(c => c.classList.remove('viewing'));
            cell.classList.add('viewing');
            if (cell.classList.contains('selected')) {
                cell.classList.remove('selected');
                selectedKanjiData = selectedKanjiData.filter(s => s.c !== mainChar);
            } else {
                cell.classList.add('selected');
                selectedKanjiData.push({
                    c: mainChar,
                    hv: item["TEN BO"] || "",
                    m: item.NGHIA || "",
                    on: "STT: " + (item.STT || ""),
                    kun: "", v: []
                });
            }
            showBoThuDetails(item);
        };
        grid.appendChild(cell);
    });
}

// Hàm hiển thị chi tiết bộ thủ vào bảng bên phải
function showBoThuDetails(item) {
    // Lấy chữ chính để vẽ (HanziWriter chỉ vẽ được 1 chữ)
    const mainChar = item.BO ? item.BO.split(',')[0].trim() : "";
    // Kích hoạt lọc các Kanji có bộ thủ này
    displayRelatedKanji(mainChar);
    typeText(`Bộ thủ: ${mainChar} - Ý nghĩa: ${item.NGHIA}`);
    window.currentSelectedKanji = mainChar;
    
    // Đổ dữ liệu vào bảng bên phải - chú ý tên thuộc tính VIẾT HOA
    document.getElementById('hv-val').textContent = item["TEN BO"] || "---"; 
    document.getElementById('mean-val').textContent = item.NGHIA || "Chưa có nghĩa";
    document.getElementById('on-val').textContent = "STT: " + (item.STT || "0");
    document.getElementById('kun-val').textContent = "-";
    
    document.getElementById('vocab-section').style.display = 'none';
    
    // Vẽ animation
    document.getElementById('writer-canvas').innerHTML = '';
    if (mainChar) {
        HanziWriter.create('writer-canvas', mainChar, { 
            width: 160, 
            height: 160, 
            strokeColor: '#a63d40' 
        }).animateCharacter();
    }
}
        // 1. DỮ LIỆU
        async function loadData() {
            try {
                const response = await fetch('kanji_data.json');
                allLevels = await response.json();
                switchLevel('N5', document.querySelector('.l-btn'));
            } catch (e) { console.error("Lỗi: Không tìm thấy file dữ liệu."); }
        }

        function typeText(text) {
    const element = document.getElementById('type-text');
    if (!element) return;
    
    // Xóa bộ đếm cũ nếu đang chạy dở
    if (window.typingTimer) clearTimeout(window.typingTimer);
    
    element.textContent = ""; 
    let i = 0;
    
    function typing() { 
        if (i < text.length) { 
            element.textContent += text.charAt(i); 
            i++; 
            window.typingTimer = setTimeout(typing, 40); // Tốc độ chạy chữ
        } 
    }
    typing();
}

        function switchLevel(lvl, btn) {
            if (btn) {
                document.querySelectorAll('.l-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            }
            renderGrid(allLevels[lvl] || []);
        const messages = {
        'N5': "Cấp độ N5: Những bước đi đầu tiên chinh phục Kanji!",
        'N4': "Cấp độ N4: Cố gắng lên, cậu đang tiến bộ rất nhanh đó.",
        'N3': "Cấp độ N3: Bắt đầu vào giai đoạn trung cấp rồi đấy!",
        'N2': "Cấp độ N2: Wow, cậu đang học những chữ Kanji rất khó rồi.",
        'N1': "Cấp độ N1: Đỉnh cao Kanji đây rồi, cùng chinh phục nhé!"
    };
    
    typeText(messages[lvl] || `Đang hiển thị danh sách chữ ${lvl}...`);
    renderGrid(allLevels[lvl] || []);

        }

       function renderGrid(data) {
    const grid = document.getElementById('kanji-grid');
    grid.innerHTML = '';
    data.forEach(item => {
        const cell = document.createElement('div');
        cell.className = 'kanji-cell';
        if (selectedKanjiData.some(s => s.c === item.c)) cell.classList.add('selected');
        
        // Cấu trúc HTML mới cho ô vuông
        cell.innerHTML = `
            <div class="kanji-char">${item.c}</div>
            <div class="hv-label">${item.hv || ''}</div>
        `;

        cell.onclick = () => {
            document.querySelectorAll('.kanji-cell').forEach(c => c.classList.remove('viewing'));
            cell.classList.add('viewing');
            if (cell.classList.contains('selected')) {
                cell.classList.remove('selected');
                selectedKanjiData = selectedKanjiData.filter(s => s.c !== item.c);
            } else {
                cell.classList.add('selected');
                selectedKanjiData.push(item);
            }
            showDetails(item);
        };
        grid.appendChild(cell);
    });
}

        function showDetails(item) {
            typeText(`Cậu đang xem chi tiết chữ "${item.c}". Hãy nhìn cách viết ở trong khung nhé!`);
            window.currentSelectedKanji = item.c;
            document.getElementById('hv-val').textContent = item.hv;
            document.getElementById('mean-val').textContent = item.m;
            document.getElementById('on-val').textContent = item.on;
            document.getElementById('kun-val').textContent = item.kun;
            const vSection = document.getElementById('vocab-section');
            const vList = document.getElementById('vocab-list');
            vList.innerHTML = '';
            if (item.v && item.v.length > 0) {
                vSection.style.display = 'block';
                item.v.forEach(v => { vList.innerHTML += `<div class="vocab-item"><b>${v.w}</b> <span>${v.n}</span></div>`; });
            } else { vSection.style.display = 'none'; }
            document.getElementById('writer-canvas').innerHTML = '';
            HanziWriter.create('writer-canvas', item.c, { width: 160, height: 160, strokeColor: '#a63d40' }).animateCharacter();
        }

        // 2. HỆ THỐNG VIẾT TAY (ĐÃ FIX TRIỆT ĐỂ)
        const modalCanvas = document.getElementById('hw-canvas-modal');
        const modalCtx = modalCanvas.getContext('2d');
        let isDrawing = false;
        let strokes = [];
        let currentStroke = [];

        function openModal() {
            typeText("Cậu cứ vẽ vào bảng, để Sumi đoán xem đó là chữ gì nhé!");
            document.getElementById('hw-modal').style.display = 'flex';
            // Cần delay cực ngắn để Canvas đo đúng kích thước thực tế sau khi hiện Modal
            setTimeout(() => {
                const rect = modalCanvas.getBoundingClientRect();
                modalCanvas.width = rect.width;
                modalCanvas.height = rect.height;
                // Cấu hình nét vẽ
                modalCtx.lineWidth = 5;
                modalCtx.lineCap = 'round';
                modalCtx.lineJoin = 'round';
                modalCtx.strokeStyle = '#333';
            }, 50);
        }

        function closeModal() {
            document.getElementById('hw-modal').style.display = 'none';
            clearCanvas();
        }

        function getPos(e) {
            const rect = modalCanvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function startDrawing(e) {
            isDrawing = true;
            currentStroke = [];
            const pos = getPos(e);
            modalCtx.beginPath();
            modalCtx.moveTo(pos.x, pos.y);
            currentStroke.push([pos.x, pos.y]);
        }

        function draw(e) {
            if (!isDrawing) return;
            const pos = getPos(e);
            modalCtx.lineTo(pos.x, pos.y);
            modalCtx.stroke();
            currentStroke.push([pos.x, pos.y]);
        }

        function endDrawing() {
            if (!isDrawing) return;
            isDrawing = false;
            if (currentStroke.length > 0) {
                strokes.push(currentStroke);
                recognizeHandwriting();
            }
        }

        // Gắn sự kiện cho Canvas Modal
        modalCanvas.addEventListener('mousedown', startDrawing);
        modalCanvas.addEventListener('mousemove', draw);
        window.addEventListener('mouseup', endDrawing);

        modalCanvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDrawing(e); }, {passive: false});
        modalCanvas.addEventListener('touchmove', (e) => { e.preventDefault(); draw(e); }, {passive: false});
        modalCanvas.addEventListener('touchend', endDrawing, {passive: false});

        async function recognizeHandwriting() {
            const url = "https://www.google.com.tw/inputtools/request?ime=handwriting&app=mobilesearch&cs=1&oe=UTF-8";
            // Định dạng ink theo đúng yêu cầu API Google
            const ink = strokes.map(s => [
                s.map(p => Math.round(p[0])),
                s.map(p => Math.round(p[1])),
                []
            ]);

            const payload = {
                options: "enable_pre_space",
                requests: [{
                    writing_guide: { 
                        writing_area_width: modalCanvas.width, 
                        writing_area_height: modalCanvas.height 
                    },
                    ink: ink,
                    language: "ja"
                }]
            };

            try {
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (data[0] === "SUCCESS") {
                    renderPredictions(data[1][0][1]);
                }
            } catch (err) {
                console.error("Lỗi API tra cứu:", err);
            }
        }

        function renderPredictions(candidates) {
            const row = document.getElementById('prediction-row');
            row.innerHTML = '';
            candidates.slice(0, 10).forEach(char => {
                const d = document.createElement('div');
                d.innerText = char;
                d.style = "background:white; border:1px solid #a63d40; color:#a63d40; min-width:48px; height:48px; display:flex; align-items:center; justify-content:center; border-radius:12px; cursor:pointer; font-weight:bold; font-size:22px; flex-shrink:0; box-shadow: 0 2px 5px rgba(0,0,0,0.05);";
                d.onclick = () => {
                    findAndShow(char);
                    closeModal();
                };
                row.appendChild(d);
            });
        }

        function findAndShow(char) {
            let found = null;
            for (const l in allLevels) {
                found = allLevels[l].find(i => i.c === char);
                if (found) break;
            }
            if (found) showDetails(found);
            else showDetails({c: char, hv: "Tra cứu", m: "Chưa có dữ liệu", on: "-", kun: "-", v: []});
        }

        function clearCanvas() {
            modalCtx.clearRect(0, 0, modalCanvas.width, modalCanvas.height);
            strokes = [];
            document.getElementById('prediction-row').innerHTML = '<span style="color:#ccc; font-style:italic; font-size:13px; margin-top:15px;">Kết quả sẽ hiện ở đây...</span>';
        }

        function undoStroke() {
            strokes.pop();
            modalCtx.clearRect(0, 0, modalCanvas.width, modalCanvas.height);
            strokes.forEach(s => {
                modalCtx.beginPath();
                modalCtx.moveTo(s[0][0], s[0][1]);
                s.forEach(p => modalCtx.lineTo(p[0], p[1]));
                modalCtx.stroke();
            });
            if (strokes.length > 0) recognizeHandwriting();
            else clearCanvas();
        }

        function countVisibleKanji() { typeText(`Hiện có ${document.getElementById('kanji-grid').children.length} chữ.`); }
        function selectAllInGrid() {
    const cells = document.querySelectorAll('.kanji-cell');
    if (cells.length === 0) return;

    // Kiểm tra xem có phải tất cả các ô hiện tại đều đã được chọn hay chưa
    const allSelected = Array.from(cells).every(c => c.classList.contains('selected'));

    if (allSelected) {
        // TRƯỜNG HỢP 1: BỎ CHỌN TẤT CẢ
        cells.forEach(c => {
            c.classList.remove('selected');
            const char = c.innerText;
            selectedKanjiData = selectedKanjiData.filter(s => s.c !== char);
        });
        typeText("Đã bỏ chọn toàn bộ danh sách này.");
    } else {
        // TRƯỜNG HỢP 2: CHỌN TẤT CẢ (Chưa chọn hết thì chọn cho hết)
        cells.forEach(c => {
            if (!c.classList.contains('selected')) {
                // Giả lập cú nhấp chuột để kích hoạt logic lưu dữ liệu đã viết ở hàm render
                c.click(); 
            }
        });
        typeText(`Đã chọn tất cả ${cells.length} mục trong danh sách!`);
    }
}
