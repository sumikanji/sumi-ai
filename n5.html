<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>sumi ai - n5 mastery garden pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@600&family=Quicksand:wght@300;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <style>
        :root {
            --paper: #fdfcf8; 
            --ink: #1a1a1a;
            --muji-red: #a63d40;
            --orange: #e67e22; 
            --border: #e0ddd5;
            --bg-soft: #f0ede5;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg-soft);
            background-image: url('https://www.transparenttextures.com/patterns/paper-fibers.png');
            color: var(--ink);
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }

        /* --- BANNER NÂNG CẤP SIÊU HẤP DẪN --- */
        .academic-pill-banner {
            width: 100%;
            max-width: 900px;
            padding: 20px 40px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            margin-bottom: 25px;
        }

        .brand-zone { display: flex; flex-direction: column; gap: 5px; }
        .brand-top { display: flex; align-items: center; gap: 12px; }
        .brand-logo { 
            width: 35px; height: 35px; background: var(--muji-red); 
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            color: #fff; font-weight: 700; font-size: 0.7rem; transform: rotate(-10deg);
        }
        .main-title { font-size: 1.8rem; letter-spacing: 4px; font-weight: 700; margin: 0; color: var(--ink); }
        .sub-title { font-size: 0.65rem; letter-spacing: 3px; color: var(--muji-red); font-weight: 700; text-transform: uppercase; }

        /* --- KHUNG HIỂN THỊ SỐ TO & RIÊNG BIỆT --- */
        .mastery-stats { display: flex; gap: 15px; }
        .stat-box {
            background: #fff;
            padding: 10px 25px;
            border-radius: 25px;
            border: 1px solid var(--border);
            text-align: center;
            min-width: 110px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
            transition: 0.3s;
        }
        .stat-box.highlight { border-color: var(--orange); background: linear-gradient(to bottom, #fff, #fff9f0); }
        .stat-label { display: block; font-size: 0.55rem; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
        .stat-num { font-size: 1.8rem; font-weight: 700; line-height: 1; }
        .highlight .stat-num { color: var(--orange); }

        /* --- KHUNG LƯU TRỮ --- */
        .archive-vault {
            flex: 1;
            width: 100%;
            max-width: 900px;
            background: var(--paper);
            border-radius: 50px;
            border: 2px solid var(--border);
            padding: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); 
            gap: 20px;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05);
        }

        .archive-vault::-webkit-scrollbar { width: 3px; }
        .archive-vault::-webkit-scrollbar-thumb { background: var(--orange); border-radius: 10px; }

        /* --- THẺ KANJI --- */
        .kanji-item {
            background: #fff;
            border-radius: 30px;
            aspect-ratio: 1 / 1.3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 1px solid var(--border);
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            position: relative;
            opacity: 0.25;
            filter: grayscale(1);
        }

        .kanji-item.mastered {
            opacity: 1;
            filter: grayscale(0);
            border-color: var(--orange);
            background: linear-gradient(145deg, #ffffff, #fffaf5);
            box-shadow: 0 15px 35px rgba(230, 126, 34, 0.1);
        }

        .kanji-item:hover {
            transform: scale(1.08) rotate(2deg);
            opacity: 1;
            border-color: var(--muji-red);
        }

        .char-box { font-family: 'Klee One', cursive; font-size: 3.5rem; color: var(--ink); transition: 0.4s; }
        .mastered .char-box { color: var(--muji-red); text-shadow: 2px 2px 0px rgba(0,0,0,0.05); }

        .hv-tag { font-size: 0.9rem; font-weight: 700; color: #888; margin-top: 10px; letter-spacing: 1px; }
        .mastered .hv-tag { color: var(--orange); }

        .progress-circle { position: absolute; top: 12px; right: 12px; width: 12px; height: 12px; border-radius: 50%; background: #eee; border: 2px solid #ddd; }
        .mastered .progress-circle { background: var(--orange); border-color: var(--orange); box-shadow: 0 0 5px var(--orange); }

        /* --- MODAL --- */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 26, 26, 0.9);
            display: none; align-items: center; justify-content: center;
            z-index: 100; backdrop-filter: blur(10px);
        }
        .modal.active { display: flex; }

        .workbook-card {
            width: 90%; max-width: 420px;
            background: #fff; border-radius: 50px;
            padding: 50px 30px; text-align: center;
            border: 1px solid var(--orange);
            box-shadow: 0 30px 70px rgba(0,0,0,0.3);
        }

        .btn-illuminate {
            background: var(--ink); color: #fff; border: none;
            padding: 16px 45px; border-radius: 50px; font-weight: 700;
            cursor: pointer; margin-top: 35px; font-family: inherit;
            text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px;
            transition: 0.3s;
        }
        .btn-illuminate:hover { background: var(--orange); transform: translateY(-3px); }
    </style>
</head>
<body>

    <div class="academic-pill-banner">
        <div class="brand-zone">
            <div class="brand-top">
                <div class="brand-logo">AI</div>
                <h1 class="main-title">SUMI GARDEN</h1>
            </div>
            <div class="sub-title">n5 mastery intellectual archive</div>
        </div>

        <div class="mastery-stats">
            <div class="stat-box highlight">
                <span class="stat-label">mastered</span>
                <span class="stat-num" id="mastered-count">0</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">total</span>
                <span class="stat-num" id="total-count">0</span>
            </div>
        </div>
    </div>

    <div class="archive-vault" id="garden-grid">
        <!-- Kanji nodes -->
    </div>

    <div id="modal" class="modal">
        <div class="workbook-card">
            <div id="drawing-zone" style="background:#fcfcfc; border-radius:35px; border:1px solid #eee; margin-bottom: 25px;"></div>
            <div id="detail-hv" style="font-size: 3rem; color: var(--muji-red); font-weight: 700; letter-spacing: 2px;"></div>
            <button class="btn-illuminate" id="btn-save">thắp sáng tri thức</button>
            <div style="margin-top: 30px; color: #ddd; cursor: pointer; font-weight: 700; font-size: 0.7rem;" onclick="closeModal()">[ close garden ]</div>
        </div>
    </div>

<script>
    let allData = [];
    let writer = null;

    async function init() {
        try {
            const res = await fetch('JLPT.json');
            const data = await res.json();
            allData = data["N5"] || [];
            updateStats();
            render();
        } catch (e) { console.error("Data error"); }
    }

    function updateStats() {
        const mastered = JSON.parse(localStorage.getItem('sumi_garden_n5') || '[]');
        document.getElementById('total-count').innerText = allData.length;
        document.getElementById('mastered-count').innerText = mastered.length;
    }

    function render() {
        const grid = document.getElementById('garden-grid');
        grid.innerHTML = '';
        const mastered = JSON.parse(localStorage.getItem('sumi_garden_n5') || '[]');

        allData.forEach((item) => {
            const isMastered = mastered.includes(item.c);
            const node = document.createElement('div');
            node.className = 'kanji-item' + (isMastered ? ' mastered' : '');
            node.innerHTML = `
                <div class="progress-circle"></div>
                <div class="char-box">${item.c}</div>
                <div class="hv-tag">${item.hv}</div>
            `;
            node.onclick = () => openModal(item);
            grid.appendChild(node);
        });
    }

    function openModal(item) {
        document.getElementById('modal').classList.add('active');
        document.getElementById('detail-hv').innerText = item.hv;
        const box = document.getElementById('drawing-zone');
        box.innerHTML = '';
        writer = HanziWriter.create('drawing-zone', item.c, {
            width: 250, height: 250, padding: 30,
            strokeColor: '#a63d40', outlineColor: '#f0f0f0', showOutline: true
        });
        writer.animateCharacter();
        document.getElementById('btn-save').onclick = () => {
            let mastered = JSON.parse(localStorage.getItem('sumi_garden_n5') || '[]');
            if (!mastered.includes(item.c)) {
                mastered.push(item.c);
                localStorage.setItem('sumi_garden_n5', JSON.stringify(mastered));
            }
            closeModal(); updateStats(); render();
        };
    }

    function closeModal() { document.getElementById('modal').classList.remove('active'); }
    window.onload = init;
</script>

</body>
</html>
