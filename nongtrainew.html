<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>nông trại kanji - sumi ai</title>
    <style>
        :root {
            --bg: #e0e7d8;
            --sidebar: #f8f1e5;
            --grass: #a5d6a7;
            --soil: #795548;
            --dark: #333333;
            --white: #ffffff;
            --accent: #ffb74d;
            --exp: #ba68c8;
            --kanji-red: #a63d40;
        }

        * { 
            box-sizing: border-box; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            font-weight: bold; 
            text-transform: lowercase; 
            margin: 0; padding: 0; 
        }

        body { 
            background-color: var(--bg); 
            display: flex; 
            height: 100dvh; 
            overflow: hidden; 
            color: var(--dark); 
        }

        /* --- sidebar responsive --- */
        .sidebar { 
            width: 280px; 
            background: var(--sidebar); 
            border-right: 6px solid var(--dark); 
            display: flex; 
            flex-direction: column; 
            padding: 20px; 
            gap: 15px; 
            z-index: 10; 
        }
        
        .char-frame {
            background: var(--white); border: 6px solid var(--dark); border-radius: 30px;
            padding: 15px; text-align: center; box-shadow: 0 6px 0 var(--dark); position: relative;
        }

        .avatar-main {
            width: 70px; height: 70px; background: #ffccbc; margin: 0 auto 10px;
            border-radius: 50%; border: 4px solid var(--dark); font-size: 2.5rem;
            display: flex; align-items: center; justify-content: center;
        }

        .exp-bar {
            width: 100%; height: 14px; background: #eee; border-radius: 10px;
            border: 3px solid var(--dark); margin-top: 10px; overflow: hidden;
        }
        #exp-fill { height: 100%; background: var(--exp); transition: 0.5s; }

        .nav-menu { display: flex; flex-direction: column; gap: 12px; }
        .nav-btn { 
            background: var(--white); border: 4px solid var(--dark); border-radius: 20px; 
            padding: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; 
            gap: 10px; box-shadow: 0 5px 0 var(--dark); transition: 0.1s; width: 100%;
        }
        .nav-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 var(--dark); }
        .nav-btn.active { background: var(--accent); color: white; }

        /* --- main area --- */
        .main-game { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 15px; position: relative; }
        .top-stats { display: flex; justify-content: flex-end; gap: 10px; }
        .stat-box { 
            background: white; padding: 8px 15px; border: 4px solid var(--dark); 
            border-radius: 15px; box-shadow: 0 4px 0 var(--dark); font-size: 0.9rem;
        }

        .display-area { 
            flex: 1; background: var(--grass); border: 6px solid var(--dark); 
            border-radius: 40px; padding: 20px; display: flex; 
            justify-content: center; align-items: center; position: relative; 
            box-shadow: inset 0 0 40px rgba(0,0,0,0.1);
        }

        /* Vườn thích ứng: PC 3x2, Mobile 2x3 */
        .garden-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: clamp(10px, 3vw, 25px); 
            width: 100%;
            max-width: 800px;
        }

        .plot { 
            background: var(--soil); border: 5px solid #4e342e; border-radius: 25px; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; box-shadow: inset 0 -8px 0 rgba(0,0,0,0.3); transition: 0.2s; 
            aspect-ratio: 1/1; width: 100%;
        }

        .kanji-main { 
            width: 80%; height: 80%; background: white; border: 4px solid var(--dark); 
            border-radius: 18px; display: flex; align-items: center; justify-content: center; 
            font-size: clamp(2rem, 8vw, 4rem); color: var(--dark);
            animation: grow 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Kho hạt giống tối ưu iPhone */
        .overlay-panel {
            position: absolute; inset: 10px; background: #fff9c4; 
            border: 6px solid var(--dark); border-radius: 35px; display: none; 
            flex-direction: column; padding: 20px; z-index: 20; 
            max-height: calc(100% - 20px);
        }

        .seed-list {
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 10px; padding: 10px; overflow-y: auto !important; 
            flex: 1; -webkit-overflow-scrolling: touch; 
        }

        .seed-item {
            background: white; border: 4px solid var(--dark); border-radius: 15px; 
            padding: 10px 5px; text-align: center; cursor: pointer; box-shadow: 0 4px 0 var(--dark);
            aspect-ratio: 1/1.2; display: flex; flex-direction: column; justify-content: center;
        }

        /* --- Responsive Mobile --- */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { 
                width: 100%; height: auto; border-right: none; 
                border-bottom: 6px solid var(--dark); padding: 10px; gap: 10px;
            }
            .char-frame { display: none; }
            .nav-menu { flex-direction: row; justify-content: center; }
            .nav-btn { padding: 10px; font-size: 0.85rem; }
            .main-game { padding: 10px; }
            .display-area { border-radius: 30px; padding: 15px; }
            .garden-grid { grid-template-columns: repeat(2, 1fr); max-width: 400px; }
        }

        @keyframes grow { 0% { transform: scale(0); } 100% { transform: scale(1); } }

        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: #fdf5e6; border: 8px solid var(--dark); border-radius: 40px; padding: 25px; width: 85%; max-width: 400px; text-align: center; }
        .big-kanji { font-size: 5rem; background: white; border: 5px solid var(--dark); border-radius: 30px; margin: 15px 0; padding: 10px; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="char-frame">
            <div class="avatar-main">🤖</div>
            <div style="font-size: 1.1rem;">sumi bot</div>
            <div class="exp-bar"><div id="exp-fill" style="width: 60%;"></div></div>
        </div>
        <nav class="nav-menu">
            <button class="nav-btn active" onclick="showView('garden')">🏡 vườn</button>
            <button class="nav-btn" onclick="showView('seeds')">🌱 hạt giống</button>
        </nav>
    </aside>

    <main class="main-game">
        <div class="top-stats">
            <div class="stat-box">💰 2,450</div>
            <div class="stat-box">💎 120</div>
        </div>
        <div class="display-area">
            <div id="garden-view" class="garden-grid"></div>
            <div id="seeds-view" class="overlay-panel">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <h2 style="font-size:1.2rem;">🌱 kho hạt giống</h2>
                    <button onclick="showView('garden')" style="border:none; background:none; cursor:pointer; font-size:2rem;">✖</button>
                </div>
                <div class="seed-list" id="seed-container"></div>
            </div>
        </div>
    </main>

    <div id="modal-review" class="modal">
        <div class="modal-content">
            <h2 id="m-hv" style="color: var(--kanji-red); font-size: 1.5rem;">âm hán</h2>
            <div class="big-kanji" id="m-kanji">?</div>
            <p id="m-meaning">nghĩa...</p>
            <button class="nav-btn" style="background:var(--kanji-red); color:white; margin-top:20px;" onclick="harvestKanji()">🧺 thu hoạch</button>
        </div>
    </div>

    <script>
        let kanjiData = []; 
        let gardenPlots = ["日", "本"];
        let currentHarvestingIndex = -1;

        async function loadData() {
            try {
                const response = await fetch('data.json'); 
                const rawData = await response.json();
                kanjiData = [];
                Object.keys(rawData).forEach(level => {
                    rawData[level].forEach(item => {
                        kanjiData.push({ kanji: item.c, hv: item.hv, meaning: item.m_vi });
                    });
                });
                renderGarden();
                renderSeedList();
            } catch (error) { console.error('lỗi nạp dữ liệu'); }
        }

        function renderGarden() {
            const container = document.getElementById('garden-view');
            container.innerHTML = "";
            for (let i = 0; i < 6; i++) {
                const plot = document.createElement('div');
                plot.className = 'plot';
                if (gardenPlots[i]) {
                    const char = gardenPlots[i];
                    const item = kanjiData.find(d => d.kanji === char) || {hv:'?', meaning:'?'};
                    plot.onclick = () => openModal(item, i);
                    plot.innerHTML = `<div class="kanji-main">${char}</div>`;
                } else { plot.innerHTML = `<div style="opacity:0.2; font-size:2rem;">🌱</div>`; }
                container.appendChild(plot);
            }
        }

        function renderSeedList() {
            const container = document.getElementById('seed-container');
            container.innerHTML = "";
            kanjiData.forEach(item => {
                const div = document.createElement('div');
                div.className = 'seed-item';
                div.onclick = () => plantKanji(item.kanji);
                div.innerHTML = `<div style="font-size:1.8rem;">${item.kanji}</div><div style="font-size:0.7rem; color:var(--kanji-red);">${item.hv}</div>`;
                container.appendChild(div);
            });
        }

        function plantKanji(char) {
            if (gardenPlots.length < 6) {
                gardenPlots.push(char);
                renderGarden();
                showView('garden');
            } else { alert('vườn đầy rồi!'); }
        }

        function harvestKanji() {
            if (currentHarvestingIndex > -1) {
                gardenPlots.splice(currentHarvestingIndex, 1);
                const fill = document.getElementById('exp-fill');
                let w = parseInt(fill.style.width) || 0;
                if(w < 100) fill.style.width = (w + 10) + "%";
                renderGarden(); closeModal();
            }
        }

        function showView(v) {
            document.getElementById('garden-view').style.display = (v === 'garden') ? 'grid' : 'none';
            document.getElementById('seeds-view').style.display = (v === 'seeds') ? 'flex' : 'none';
            if(v === 'seeds') document.getElementById('seed-container').scrollTop = 0;
        }

        function openModal(item, index) {
            currentHarvestingIndex = index;
            document.getElementById('m-hv').innerText = item.hv;
            document.getElementById('m-kanji').innerText = item.kanji;
            document.getElementById('m-meaning').innerText = "nghĩa: " + item.meaning;
            document.getElementById('modal-review').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modal-review').style.display = 'none'; }
        window.onload = loadData;
        window.onclick = (e) => { if (e.target.className === 'modal') closeModal(); }
    </script>
</body>
</html>
