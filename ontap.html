<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sumi AI - Kanji Flashcards Master</title>
    <script src="https://unpkg.com/wanakana"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;500;700;900&family=Noto+Sans+JP:wght@300;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --forest-green: #558b2f;
            --soft-green: #f1f8e9;
            --candy-orange: #ffb74d;
            --muji-red: #a63d40;
            --bg-dot: #c5e1a5;
        }

        body {
            font-family: 'Be Vietnam Pro', sans-serif;
            font-weight: 300;
            background-color: var(--soft-green);
            background-image: radial-gradient(var(--bg-dot) 2px, transparent 2px);
            background-size: 20px 20px;
            color: #4e342e;
            min-height: 100dvh; 
    overflow-y: auto; 
    display: flex;
    flex-direction: column;
    margin: 0;
        }


        /* Vùng chứa Kanji: Không cuộn, căn giữa tuyệt đối */
.kanji-container-wrapper {
    width: 100%;
    max-width: 100%; /* Ép không được vượt quá chiều rộng thẻ */
    height: 160px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden; /* Cắt bỏ phần thừa nếu lỡ bị tràn */
    padding: 0 15px;
    box-sizing: border-box; /* Tính cả padding vào width */
}

.kanji-display {
    font-size: 80px;
    font-weight: 800;
    color: var(--forest-green);
    white-space: nowrap; /* Cấm xuống dòng */
    display: block; /* Đổi sang block để đo width chính xác hơn */
    text-align: center;
}

        .flashcard-container {
    flex-shrink: 0;
    background: white;
    border: 4px solid var(--forest-green);
    border-radius: 40px;
    box-shadow: 0 12px 0px var(--bg-dot);
    width: 95%;
    max-width: 420px;
    min-height: 460px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    position: relative;
    margin: 20px auto; /* Thêm margin trên dưới để khi cuộn không dính sát mép */
    transition: all 0.3s ease;
}

        .input-bar {
            border: 3px solid #eee;
            border-radius: 20px;
            outline: none;
            transition: all 0.2s;
            font-size: 1.6rem;
            text-align: center;
            font-weight: 300;
        }

        .input-bar:focus { border-color: var(--candy-orange); }
        .input-correct { border-color: #4caf50 !important; background-color: #e8f5e9; }
        .input-wrong { border-color: var(--muji-red) !important; background-color: #ffebee; }

        .btn-jlpt {
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 800;
            background: white;
            border: 2px solid var(--bg-dot);
            transition: all 0.2s;
        }

        .btn-jlpt.active {
            background: var(--forest-green);
            color: white;
            border-color: var(--forest-green);
        }

        /* Nút chức năng mới */
        .btn-mastered {
            background: #e8f5e9;
            color: #2e7d32;
            font-size: 11px;
            font-weight: 900;
            padding: 10px 20px;
            border-radius: 15px;
            margin-top: 20px;
            border: 2px solid transparent;
            transition: all 0.2s;
        }

        .btn-mastered:hover {
            border-color: #2e7d32;
        }

        .btn-reset {
            color: #999;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 5px 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--candy-orange), #ff9800);
            width: 0%;
            transition: width 0.4s ease;
        }
        .btn-3d {
    transition: all 0.1s active;
    position: relative;
    top: 0;
}
.btn-3d:active {
    top: 4px;
    box-shadow: 0 0px 0px var(--bg-dot) !important;
}
.meaning-hidden {
    opacity: 0 !important;
    visibility: hidden;
    pointer-events: none;
}
/* Thêm hiệu ứng cho nút con mắt khi ở trạng thái đóng */
.eye-closed {
    color: #ccc !important;
    background-color: #f5f5f5 !important;
}
/* Style cho nút con mắt 3D nhỏ */
.btn-eye-3d {
    transition: all 0.1s;
    box-shadow: 0 4px 0px 0px #ddd;
}
.btn-eye-3d:active {
    transform: translateY(2px);
    box-shadow: 0 0px 0px 0px #ddd;
}
/* Khung chứa nội dung chính (Kanji + Nghĩa) phải có chiều cao cố định */
.flashcard-content-area {
    height: 280px; /* Cố định chiều cao phần nội dung chính */
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    width: 100%;
}

/* Khung chứa nghĩa có thể cuộn nếu quá dài nhưng không làm giãn khung lớn */
.meaning-scroll-box {
    max-height: 80px; /* Chiều cao tối đa cho phần nghĩa */
    overflow-y: auto;
    width: 100%;
    scrollbar-width: none; /* Ẩn thanh cuộn trên Firefox */
}

.meaning-scroll-box::-webkit-scrollbar {
    display: none; /* Ẩn thanh cuộn trên Chrome/Safari */
}
/* Khung chứa Nghĩa cố định */
.meaning-container-wrapper {
    width: 100%;
    height: 60px; /* Chiều cao cố định cho phần nghĩa */
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding: 0 15px;
    margin-top: 10px;
    box-sizing: border-box;
}
#meaning-text {
    font-family: 'Be Vietnam Pro', sans-serif;
    font-size: 1.2rem; /* Chỉnh lại kích thước cho vừa mắt */
    font-weight: 500; /* Độ đậm vừa phải để chữ trông mềm */
    color: #5b5a5a; /* Màu nâu đất nhẹ nhàng thay vì xám đen */
    text-transform: none !important; /* QUAN TRỌNG: Bỏ viết hoa toàn bộ */
    font-style: normal; /* Bỏ in nghiêng nếu muốn chữ trông hiện đại, tròn trịa hơn */
    letter-spacing: 0.2px;
    line-height: 1.4;
    transition: all 0.2s ease;
}
.btn-round-3d {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    background: white;
    transition: all 0.1s;
    position: relative;
    top: 0;
}

/* Nút Gợi ý (Màu cam candy) */
.btn-hint {
    border: 2px solid var(--candy-orange);
    color: var(--candy-orange);
    box-shadow: 0 3px 0px 0px var(--candy-orange);
}

/* Nút Làm mới (Màu xám) */
.btn-reload {
    border: 2px solid #ddd;
    color: #999;
    box-shadow: 0 3px 0px 0px #ddd;
}

.btn-round-3d:active {
    top: 2px;
    box-shadow: 0 0px 0px 0px transparent !important;
}
/* Nền mờ phía sau Popup */
.modal-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.4);
    backdrop-filter: blur(4px);
    display: none; /* Ẩn mặc định */
    justify-content: center;
    align-items: center;
    z-index: 10000;
}

/* Khung nội dung Popup */
.modal-content {
    background: white;
    padding: 30px;
    border-radius: 30px;
    border: 4px solid var(--forest-green);
    box-shadow: 0 10px 0px var(--bg-dot);
    text-align: center;
    max-width: 320px;
    width: 90%;
    transform: scale(0.8);
    transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.modal-overlay.active { display: flex; }
.modal-overlay.active .modal-content { transform: scale(1); }

/* Nút bấm trong Popup */
.btn-confirm {
    background: #3f9843;
    color: white;
    box-shadow: 0 4px 0px #3f8742;
}
.btn-cancel {
    background: #eee;
    color: #666;
    box-shadow: 0 4px 0px #ccc;
}
.btn-confirm:active, .btn-cancel:active {
    transform: translateY(2px);
    box-shadow: 0 0px 0px transparent;
}
/* Nút Ngẫu nhiên dạng chữ - Màu xanh lá */
.btn-shuffle-text {
    padding: 0 12px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px; /* Bo tròn kiểu viên thuốc nhỏ */
    background: white;
    transition: all 0.1s;
    position: relative;
    top: 0;
    font-size: 9px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border: 2px solid var(--forest-green);
    color: var(--forest-green);
    box-shadow: 0 3px 0px 0px var(--forest-green);
}

.btn-shuffle-text:active {
    top: 2px;
    box-shadow: 0 0px 0px 0px transparent !important;
}
/* Tối ưu cho màn hình rất nhỏ */
/* Khi màn hình bị ép xuống (Bàn phím hiện) */
@media (max-height: 500px) {
    .flashcard-container {
        flex-direction: row; /* Chuyển sang khung ngang */
        max-width: 100%;
        height: 90%;
        border-radius: 15px;
        padding: 10px;
    }
    
    .flashcard-content-area {
        flex: 1;
        height: auto !important;
    }
    
    .kanji-container-wrapper {
        height: 100px !important;
    }

}
#feedback-toast {
    color: transparent; /* Ẩn chữ khi bình thường */
}

.toast-active {
    opacity: 1 !important;
    color: #4caf50 !important;
    transform: scale(1.1); /* Phóng to nhẹ để tạo điểm nhấn */
    transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
/* HIỆU ỨNG LẬT THÈ (FLASHCARD FLIP) */
.flashcard-scene {
    width: 100%;
    height: 280px; /* Cố định chiều cao vùng lật */
    perspective: 1000px;
    cursor: pointer;
}

.flashcard-inner {
    position: relative;
    width: 100%;
    height: 100%;
    text-align: center;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    transform-style: preserve-3d;
}

/* Trạng thái khi lật */
.flashcard-inner.is-flipped {
    transform: rotateY(180deg);
}

.card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    border-radius: 25px;
    padding: 20px;
}

.card-front {
    background: white;
}

.card-back {
    background: #fafafa;
    transform: rotateY(180deg); /* Mặt sau mặc định quay ngược */
    border: 2px dashed var(--bg-dot);
}
/* Phóng to phần hiển thị số lượng từ còn lại */
#counter {
    font-size: 14px; /* Tăng kích thước chữ tiêu đề */
    font-weight: 900;
    color: var(--forest-green);
    letter-spacing: 1px;
}

#remaining-count {
    font-size: 24px; /* Số lượng từ hiện ra rất to */
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    color: var(--muji-red);
    display: block;
    line-height: 1;
    margin-top: 5px;
}
    </style>
</head>

<nav class="p-6 flex flex-col gap-5 items-center max-w-2xl mx-auto w-full">

<script>
    let allVocabulary = [];
    let currentPool = [];
    let currentIndex = 0;
    let isComposing = false;
    let isFlipped = false; 

    const elements = {
        kanji: document.getElementById('kanji-text'),
        wrapper: document.getElementById('kanji-wrapper'),
        backReading: document.getElementById('back-reading'),
        backMeaning: document.getElementById('back-meaning'),
        cardInner: document.getElementById('card-inner'),
        input: document.getElementById('answer-input'),
        counter: document.getElementById('counter'),
        progress: document.getElementById('progress-fill'),
        percent: document.getElementById('percent'),
        tag: document.getElementById('level-tag'),
        toast: document.getElementById('feedback-toast')
    };

    // --- HÀM QUAN TRỌNG: CO GIÃN KANJI ---
    function autoScaleKanji() {
        if (!elements.wrapper || !elements.kanji) return;

        // 1. Reset về cỡ chữ tối đa và xóa mọi transform cũ
        let fontSize = 80; 
        elements.kanji.style.fontSize = fontSize + 'px';
        elements.kanji.style.transform = "none"; 

        // Lấy chiều rộng vùng chứa (trừ padding)
        const containerWidth = elements.wrapper.offsetWidth - 30; 

        // 2. Dùng vòng lặp giảm font size cho đến khi vừa khít
        // offsetWidth lấy chiều rộng thực tế của chữ đang hiển thị
        while (elements.kanji.offsetWidth > containerWidth && fontSize > 20) {
            fontSize -= 2;
            elements.kanji.style.fontSize = fontSize + 'px';
        }
    }
function shufflePool() {
    if (currentPool.length <= 1) return;

    // thuật toán shuffle Fisher-Yates để trộn thật sự ngẫu nhiên
    for (let i = currentPool.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [currentPool[i], currentPool[j]] = [currentPool[j], currentPool[i]];
    }

    currentIndex = 0; // quay về từ đầu tiên của danh sách đã trộn
    
    // hiệu ứng phản hồi trên placeholder để người dùng biết đã trộn
    elements.input.placeholder = "đã trộn ngẫu nhiên! ✨";
    setTimeout(() => { 
        elements.input.placeholder = "nhập romaji ..."; 
    }, 1000);

    displayCard(); // hiển thị từ mới ngay lập tức
}
    // Lật thẻ Flashcard
    function toggleFlip() {
        isFlipped = !isFlipped;
        elements.cardInner.style.transform = isFlipped ? "rotateY(180deg)" : "rotateY(0deg)";
    }

    async function init() {
        try {
            const savedData = localStorage.getItem('sumi_progress');
            if (savedData) {
                allVocabulary = JSON.parse(savedData);
            } else {
                const response = await fetch('data.json');
                allVocabulary = await response.json();
                allVocabulary = allVocabulary.map(item => ({...item, learned: false}));
            }
            filterLevel(localStorage.getItem('sumi_level') || 'All');
        } catch (e) { console.error("Lỗi tải dữ liệu"); }
    }

    function filterLevel(level) {
        document.querySelectorAll('.btn-jlpt').forEach(b => b.classList.remove('active'));
        const activeBtn = document.getElementById(`jlpt-${level}`);
        if(activeBtn) activeBtn.classList.add('active');
        localStorage.setItem('sumi_level', level);

        currentPool = allVocabulary.filter(item => {
            const matchLevel = (level === 'All' || item.level === level);
            return matchLevel && !item.learned;
        });

        if (currentPool.length > 0) {
            currentIndex = 0;
            displayCard();
        } else {
            elements.kanji.innerText = "✨";
            elements.counter.innerText = "ĐÃ THUỘC HẾT!";
        }
    }

    function displayCard() {
        if (currentPool.length === 0) return;
        const word = currentPool[currentIndex];
        
        // 1. Reset trạng thái thẻ (luôn hiện mặt trước)
        isFlipped = false;
        elements.cardInner.style.transform = "rotateY(0deg)";
        elements.toast.classList.remove('toast-active');

        // 2. Đổ dữ liệu
        elements.kanji.innerText = word.kanji;
        if (elements.backReading) elements.backReading.innerText = word.reading;
        if (elements.backMeaning) elements.backMeaning.innerText = word.nghia.toLowerCase();
        elements.tag.innerText = word.level || "JLPT";
        
        // 3. Reset Input
        elements.input.value = "";
        elements.input.placeholder = "Nhập Romaji ..."; 
        elements.input.classList.remove('input-correct', 'input-wrong');

        // 4. Cập nhật tiến độ
        elements.counter.innerText = `CÒN LẠI: ${currentPool.length} TỪ`;
        const prg = (currentIndex / (currentPool.length - 1 || 1)) * 100;
        elements.progress.style.width = `${prg}%`;
        elements.percent.innerText = `${Math.round(prg)}%`;

        // 5. Chạy co giãn chữ NGAY LẬP TỨC sau khi thay đổi Text
        requestAnimationFrame(() => {
            autoScaleKanji();
            elements.input.focus();
        });
    }

    function handleInputLogic(inputElement) {
        if (currentPool.length === 0) return;
        inputElement.value = wanakana.toHiragana(inputElement.value, { IMEMode: true });
        
        const currentWord = currentPool[currentIndex];
        const userInput = inputElement.value.trim();

        if (userInput === currentWord.reading) {
            inputElement.classList.add('input-correct');
            elements.toast.classList.add('toast-active');
            setTimeout(() => {
                currentIndex = (currentIndex + 1) % currentPool.length;
                displayCard();
            }, 500); 
        } else if (userInput !== "" && !currentWord.reading.startsWith(userInput)) {
            inputElement.classList.add('input-wrong');
        } else {
            inputElement.classList.remove('input-wrong');
        }
    }

    function markMastered() {
        if (currentPool.length === 0) return;
        const target = allVocabulary.find(i => i.kanji === currentPool[currentIndex].kanji);
        if (target) target.learned = true;
        currentPool.splice(currentIndex, 1);
        localStorage.setItem('sumi_progress', JSON.stringify(allVocabulary));
        displayCard();
    }

    function skipWord() {
        if (currentPool.length > 0) {
            currentIndex = (currentIndex + 1) % currentPool.length;
            displayCard();
        }
    }

    function showHint() {
        if (currentPool.length === 0) return;
        elements.input.placeholder = `Gợi ý: ${currentPool[currentIndex].reading}`;
        elements.input.focus();
    }

    function resetAll() {
        if(confirm("Xóa toàn bộ tiến độ?")) {
            allVocabulary.forEach(item => item.learned = false);
            localStorage.removeItem('sumi_progress');
            filterLevel('All');
        }
    }

    // Event Listeners
    elements.input.addEventListener('compositionstart', () => { isComposing = true; });
    elements.input.addEventListener('compositionend', (e) => { 
        isComposing = false; 
        handleInputLogic(e.target);
    });
    elements.input.addEventListener('input', (e) => {
        if (!isComposing) handleInputLogic(e.target);
    });

    window.onload = init;
    // Khi xoay màn hình hoặc đổi kích thước cũng cần co lại chữ
    window.addEventListener('resize', autoScaleKanji); 
</script>
</body>
</html>
