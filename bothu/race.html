<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sumi Rhythm - Final Finish</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Be+Vietnam+Pro:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --forest-green: #558b2f;
            --soft-green: #f1f8e9;
            --neon-cyan: #00e5ff;
            --perfect-red: #ff1744;
            --great-green: #2ecc71;
            --cool-light-blue: #4fc3f7;
            --bad-deep-pink: #d81b60;
            --finish-gold: #ffd600;
        }

        body {
            background-color: var(--soft-green);
            background-image: radial-gradient(#c5e1a5 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: 'Be Vietnam Pro', sans-serif;
            text-transform: lowercase; margin: 0; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        /* HIỆU ỨNG FINISH MOVE */
        .finish-mode-card {
            animation: finishGlow 0.6s infinite alternate;
            border-color: var(--finish-gold) !important;
            box-shadow: 0 0 40px var(--finish-gold) !important;
        }

        @keyframes finishGlow {
            from { transform: scale(1); filter: brightness(1); }
            to { transform: scale(1.02); filter: brightness(1.2); }
        }

        /* THÔNG BÁO FINISH LỚN */
        #finish-alert {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-family: 'Montserrat'; font-weight: 900; font-size: 5rem;
            color: var(--finish-gold); text-shadow: 0 0 20px rgba(0,0,0,0.5);
            z-index: 100; display: none; white-space: nowrap;
            pointer-events: none;
        }

        .alert-pop { animation: alertPop 1s ease-out forwards; }
        @keyframes alertPop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            30% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            70% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -150%) scale(0.8); }
        }

        /* UI CƠ BẢN */
        .difficulty-wrapper {
            background: white; padding: 4px; border-radius: 50px;
            border: 2px solid var(--forest-green); display: flex; gap: 5px; margin-top: 30px;
        }
        .diff-btn {
            padding: 8px 24px; border-radius: 40px; font-size: 11px; font-weight: 900;
            text-transform: uppercase; color: var(--forest-green); border: none;
            background: transparent; cursor: pointer; transition: 0.2s;
        }
        .diff-btn.active { background: var(--forest-green); color: white; }

        .rhythm-bar {
            width: 90%; max-width: 450px; height: 35px; background: #1a1a1a;
            border-radius: 50px; position: relative; margin: 25px 0; overflow: hidden; border: 3px solid #333;
        }
        .hit-zone { position: absolute; right: 10%; width: 50px; height: 100%; border-left: 2px solid var(--neon-cyan); }
        .perfect-glow { position: absolute; right: calc(10% + 22px); width: 4px; height: 100%; background: var(--neon-cyan); box-shadow: 0 0 15px var(--neon-cyan); }
        .runner-ball { position: absolute; left: 0; width: 20px; height: 20px; background: white; border-radius: 50%; top: 50%; transform: translateY(-50%); box-shadow: 0 0 10px white; z-index: 10; }

        .rank-combo-wrapper { display: flex; align-items: center; justify-content: center; gap: 20px; height: 100px; }
        .rank-label { font-family: 'Montserrat'; font-weight: 900; font-size: 3.8rem; opacity: 0; }
        #combo-label { font-family: 'Montserrat'; font-weight: 900; font-size: 3.2rem; color: #ff5722; text-shadow: 3px 3px 0 white; opacity: 0; }

        .float-up-animation { animation: floatUp 0.9s ease-out forwards; }
        @keyframes floatUp {
            0% { opacity: 0; transform: scale(0.6) translateY(40px); }
            20% { opacity: 1; transform: scale(1.1) translateY(0); }
            70% { opacity: 1; transform: scale(1) translateY(-15px); }
            100% { opacity: 0; transform: translateY(-50px); }
        }

        .quiz-card {
            background: white; border-radius: 40px; width: 90%; max-width: 500px;
            padding: 40px 20px; border: 4px solid #f9d9a5; box-shadow: 0 15px 0 #f3c677;
            text-align: center; margin-bottom: 25px; min-height: 280px; display: flex; flex-direction: column; justify-content: center;
        }
        #kanji-main { font-size: 7rem; font-weight: 700; color: var(--forest-green); line-height: 1; }

        .answer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 90%; max-width: 500px; }
        .btn-rhythm { background: white; border: 2px solid #eee; padding: 20px; border-radius: 20px; box-shadow: 0 5px 0 #eee; cursor: pointer; }
        .btn-meaning { font-size: 1.1rem; font-weight: 700; color: #8d6e63; }
        .btn-rhythm:active { transform: translateY(3px); box-shadow: none; }

        /* BẢNG KẾT QUẢ */
        .res-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; margin: 20px 0; }
        .res-item { display: flex; flex-direction: column; align-items: center; background: white; padding: 12px 5px; border-radius: 20px; border: 1px solid #f0f0f0; }
        .res-label { font-family: 'Montserrat'; font-weight: 900; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1px; opacity: 0.4; color: black; }
        .res-count { font-family: 'Montserrat'; font-weight: 900; font-size: 1.8rem; line-height: 1; margin-top: 5px; }
    </style>
</head>
<body>

    <audio id="snd-perfect" src="https://actions.google.com/sounds/v1/cartoon/clink_glasses.ogg"></audio>
    <audio id="snd-miss" src="https://actions.google.com/sounds/v1/cartoon/boing.ogg"></audio>

    <div id="finish-alert">FINISH MOVE</div>

    <div class="difficulty-wrapper" id="diff-wrap">
        <button class="diff-btn" onclick="updateSpeed(3000, this)">chậm</button>
        <button class="diff-btn active" onclick="updateSpeed(2000, this)">vừa</button>
        <button class="diff-btn" onclick="updateSpeed(1200, this)">nhanh</button>
    </div>

    <div class="rhythm-bar" id="bar-wrap">
        <div class="hit-zone"></div>
        <div class="perfect-glow"></div>
        <div id="runner" class="runner-ball"></div>
    </div>

    <div class="rank-combo-wrapper" id="rank-wrap">
        <div id="rank-text" class="rank-label">PERFECT</div>
        <div id="combo-label">X0</div>
    </div>

    <div class="quiz-card" id="quiz-main-card">
        <div id="kanji-main">...</div>
        <p id="quiz-progress" style="color: #a8a7a7; font-weight: 700; font-size: 13px; margin-top: 10px;">chạm đúng nhịp Perfect!</p>
    </div>

    <div id="answer-options" class="answer-grid"></div>

    <script>
        let quizData = [];
        let allPool = [];
        let currentIndex = 0;
        let speed = 2000;
        let combo = 0;
        let maxCombo = 0;
        let isFinishTime = false;

        const stats = { PERFECT: 0, GREAT: 0, COOL: 0, BAD: 0, MISS: 0 };

        let startTime;
        let timer;
        const lang = localStorage.getItem('sumiLang') || 'vi';

        async function init() {
            try {
                const params = new URLSearchParams(window.location.search);
                const targetId = params.get('id') || "0";
                const res = await fetch('sumi_ai_FULL_DATA_multi_lang.json');
                const data = await res.json();
                allPool = data.radicals;
                quizData = data.radicals.filter(r => parseInt(r.level_id) === parseInt(targetId));
                
                if (quizData.length === 0) {
                    document.getElementById('quiz-progress').innerText = "không có dữ liệu";
                    return;
                }

                quizData.sort(() => 0.5 - Math.random());
                play();
            } catch (e) { document.getElementById('quiz-progress').innerText = "lỗi nạp dữ liệu"; }
        }

        function updateSpeed(ms, btn) {
            speed = ms; combo = 0; maxCombo = 0; currentIndex = 0;
            Object.keys(stats).forEach(k => stats[k] = 0);
            document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            play();
        }

        async function play() {
            if (currentIndex >= quizData.length) {
                showFinalResult();
                return;
            }

            const card = document.getElementById('quiz-main-card');
            const progress = document.getElementById('quiz-progress');

            // KIỂM TRA CÂU HỎI CUỐI CÙNG
            if (currentIndex === quizData.length - 1) {
                isFinishTime = true;
                
                // Tạm dừng nhịp để chuẩn bị Finish Move
                document.getElementById('answer-options').innerHTML = '';
                const alert = document.getElementById('finish-alert');
                alert.style.display = 'block';
                alert.classList.add('alert-pop');
                
                await new Promise(r => setTimeout(r, 1200));
                
                alert.style.display = 'none';
                alert.classList.remove('alert-pop');
                card.classList.add('finish-mode-card');
                progress.innerText = "FINISH MOVE - QUYẾT ĐỊNH!";
                progress.style.color = "var(--finish-gold)";
            } else {
                isFinishTime = false;
                card.classList.remove('finish-mode-card');
                progress.innerText = `câu ${currentIndex + 1} / ${quizData.length}`;
                progress.style.color = "#a8a7a7";
            }

            const item = quizData[currentIndex];
            document.getElementById('kanji-main').innerText = item.radical.split(' ')[0];

            const correctMeaning = item.meanings[lang] || item.meanings['vi'];
            let opts = [correctMeaning];
            while(opts.length < 4) {
                let randomMeaning = allPool[Math.floor(Math.random()*allPool.length)].meanings[lang];
                if(!opts.includes(randomMeaning)) opts.push(randomMeaning);
            }
            opts.sort(() => 0.5 - Math.random());

            const container = document.getElementById('answer-options');
            container.innerHTML = '';
            opts.forEach(o => {
                const b = document.createElement('button');
                b.className = 'btn-rhythm';
                b.innerHTML = `<span class="btn-meaning">${o}</span>`;
                b.onclick = () => handleInput(o, correctMeaning);
                container.appendChild(b);
            });

            startBar();
        }

        function startBar() {
            const ball = document.getElementById('runner');
            ball.style.transition = 'none';
            ball.style.left = '0%';
            
            // Finish Move: tốc độ nhanh hơn
            const currentSpeed = isFinishTime ? speed * 0.7 : speed;

            setTimeout(() => {
                ball.style.transition = `left ${currentSpeed}ms linear`;
                ball.style.left = '100%';
                startTime = Date.now();
                clearTimeout(timer);
                timer = setTimeout(() => processResult('MISS'), currentSpeed);
            }, 50);
        }

        function handleInput(sel, cor) {
            clearTimeout(timer);
            const currentSpeed = isFinishTime ? speed * 0.7 : speed;
            const pos = (Date.now() - startTime) / currentSpeed;
            
            if (sel !== cor) processResult('MISS');
            else {
                const diff = Math.abs(pos - 0.9);
                if (diff < 0.05) processResult('PERFECT');
                else if (diff < 0.12) processResult('GREAT');
                else if (diff < 0.22) processResult('COOL');
                else processResult('BAD');
            }
        }

        function processResult(rank) {
            const lbl = document.getElementById('rank-text');
            const comboLbl = document.getElementById('combo-label');
            lbl.innerText = rank;
            stats[rank]++;

            if (rank === 'PERFECT') {
                combo++;
                if (combo > maxCombo) maxCombo = combo;
                lbl.style.color = 'var(--perfect-red)';
                document.getElementById('snd-perfect').play();
            } else {
                combo = 0; 
                if (rank === 'GREAT') lbl.style.color = 'var(--great-green)';
                else if (rank === 'COOL') lbl.style.color = 'var(--cool-light-blue)';
                else if (rank === 'BAD') lbl.style.color = 'var(--bad-deep-pink)';
                else lbl.style.color = 'var(--perfect-red)';
                
                comboLbl.style.opacity = '0';
                document.getElementById('snd-miss').play();
            }

            if (combo > 0) {
                comboLbl.innerText = `X${combo}`;
                comboLbl.classList.remove('float-up-animation');
                void comboLbl.offsetWidth;
                comboLbl.classList.add('float-up-animation');
            }

            lbl.classList.remove('float-up-animation');
            void lbl.offsetWidth;
            lbl.classList.add('float-up-animation');

            setTimeout(() => { currentIndex++; play(); }, 950);
        }

        function showFinalResult() {
            document.getElementById('answer-options').innerHTML = '';
            document.getElementById('bar-wrap').style.display = 'none';
            document.getElementById('rank-wrap').style.display = 'none';
            document.getElementById('diff-wrap').style.opacity = '0';
            
            document.getElementById('quiz-main-card').innerHTML = `
                <div class="result-container text-center">
                    <h2 class="font-black text-forest-green text-xl uppercase tracking-tighter">hoàn thành lộ trình</h2>
                    <div class="res-grid">
                        <div class="res-item"><span class="res-label">Perfect</span><span class="res-count text-[#ff1744]">${stats.PERFECT}</span></div>
                        <div class="res-item"><span class="res-label">Great</span><span class="res-count text-[#2ecc71]">${stats.GREAT}</span></div>
                        <div class="res-item"><span class="res-label">Cool</span><span class="res-count text-[#4fc3f7]">${stats.COOL}</span></div>
                        <div class="res-item"><span class="res-label">Bad</span><span class="res-count text-[#d81b60]">${stats.BAD}</span></div>
                        <div class="res-item"><span class="res-label">Miss</span><span class="res-count text-[#ff1744]">${stats.MISS}</span></div>
                        <div class="res-item" style="background: #fff3e0;"><span class="res-label" style="color: #e65100; opacity: 0.6;">Combo</span><span class="res-count text-[#ff5722]">x${maxCombo}</span></div>
                    </div>
                    <div class="flex flex-col gap-3 mt-4">
                        <button onclick="location.reload()" class="bg-forest-green text-white px-10 py-4 rounded-full font-black uppercase text-[11px] tracking-widest active:scale-95 transition-all">ôn tập lại</button>
                        <button onclick="history.back()" class="bg-white text-forest-green border-2 border-forest-green px-10 py-4 rounded-full font-black uppercase text-[11px] tracking-widest active:scale-95 transition-all">về trang chủ</button>
                    </div>
                </div>
            `;
        }

        init();
    </script>
</body>
</html>
