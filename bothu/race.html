<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sumi Rhythm - Perfect or Miss</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Be+Vietnam+Pro:wght@300;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --forest-green: #558b2f;
            --soft-green: #f1f8e9;
            --perfect-red: #ff1744;
            --miss-gray: #757575;
            --candy-orange: #ffb74d;
            --deep-orange: #e67e22;
        }

        body {
            background-color: var(--soft-green);
            background-image: radial-gradient(#c5e1a5 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: 'Be Vietnam Pro', sans-serif;
            text-transform: lowercase; margin: 0; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        .game-header {
            background-color: var(--forest-green);
            color: white; padding: 20px;
            border-radius: 0 0 40px 40px; border: 3px solid white;
            text-align: center; box-shadow: 0 10px 30px rgba(85, 139, 47, 0.2);
            width: 100%; max-width: 1024px; margin-bottom: 15px;
        }

        .mode-btn-small {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            color: white; font-size: 10px; font-weight: 900;
            padding: 6px 14px; border-radius: 12px;
            text-transform: uppercase; transition: all 0.2s;
        }

        .mode-btn-small.active {
            background-color: var(--candy-orange);
            box-shadow: 0 4px 0px var(--deep-orange);
            transform: translateY(-2px);
            opacity: 1;
        }

        .time-bar-container {
            width: 90%; max-width: 450px; height: 12px; background: white;
            border-radius: 50px; margin: 20px 0; border: 2px solid var(--forest-green);
            overflow: hidden;
        }

        .time-bar-fill {
            height: 100%; width: 100%;
            background: var(--candy-orange);
            transition: width linear;
        }

        .difficulty-container {
            background: white; padding: 4px; border-radius: 50px;
            border: 2px solid var(--forest-green); display: flex; gap: 4px;
        }

        .diff-btn {
            padding: 6px 20px; border-radius: 40px; font-size: 10px; font-weight: 900;
            text-transform: uppercase; color: var(--forest-green); background: transparent;
            border: none; cursor: pointer; transition: all 0.2s;
        }

        .diff-btn.active { background: var(--forest-green); color: white; }

        .rank-combo-wrapper { display: flex; align-items: center; justify-content: center; gap: 15px; height: 70px; }
        .rank-label { font-family: 'Montserrat'; font-weight: 900; font-size: 3rem; opacity: 0; }
        #combo-label { font-family: 'Montserrat'; font-weight: 900; font-size: 2.2rem; color: #ff5722; text-shadow: 2px 2px 0 white; opacity: 0; }

        .float-up-animation { animation: floatUp 0.7s ease-out forwards; }
        @keyframes floatUp {
            0% { opacity: 0; transform: scale(0.6) translateY(15px); }
            20% { opacity: 1; transform: scale(1.1) translateY(0); }
            100% { opacity: 0; transform: translateY(-30px); }
        }

        .quiz-card {
            background: white; border-radius: 35px; width: 92%; max-width: 450px;
            padding: 25px 15px; border: 3px solid #f9d9a5; box-shadow: 0 12px 0 #f3c677;
            text-align: center; margin-bottom: 20px; min-height: 200px; display: flex; flex-direction: column; justify-content: center;
        }
        #kanji-main { font-size: 5.5rem; font-weight: 900; color: var(--forest-green); line-height: 1; }

        .answer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 92%; max-width: 450px; }
        .btn-rhythm {
            background: white; border: 2px solid #eee; padding: 18px 10px; border-radius: 20px;
            box-shadow: 0 5px 0 #eee; cursor: pointer; -webkit-tap-highlight-color: transparent;
        }
        .btn-meaning { font-size: 1rem; font-weight: 700; color: #8d6e63; display: block; }

        .res-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; width: 100%; margin: 15px 0; }
        .res-item { display: flex; flex-direction: column; align-items: center; background: #f9f9f9; padding: 15px 5px; border-radius: 15px; border: 1px solid #f0f0f0; }
        .res-label { font-family: 'Montserrat'; font-weight: 900; font-size: 0.7rem; text-transform: uppercase; opacity: 0.4; color: black; }
        .res-count { font-family: 'Montserrat'; font-weight: 900; font-size: 2rem; line-height: 1; margin-top: 5px; }
    </style>
</head>
<body>

    <audio id="snd-perfect" src="https://actions.google.com/sounds/v1/cartoon/clink_glasses.ogg"></audio>
    <audio id="snd-miss" src="https://actions.google.com/sounds/v1/cartoon/boing.ogg"></audio>

    <header class="game-header">
        <div class="flex flex-col items-center mb-4">
            <h1 id="header-main-title" class="font-black text-[22px] uppercase tracking-tighter leading-none">sumi rhythm</h1>
            <p id="header-sub-title" class="text-[12px] font-black opacity-80 mt-1 uppercase tracking-widest">speed challenge</p>
        </div>
        <div class="flex justify-center gap-2">
            <button id="mode-han-btn" onclick="switchMode('han')" class="mode-btn-small active"></button>
            <button id="mode-mean-btn" onclick="switchMode('mean')" class="mode-btn-small"></button>
        </div>
    </header>

    <div class="difficulty-container" id="diff-wrap">
        <button class="diff-btn" onclick="updateSpeed(4000, this)" id="btn-slow"></button>
        <button class="diff-btn active" onclick="updateSpeed(3000, this)" id="btn-mid"></button>
        <button class="diff-btn" onclick="updateSpeed(1500, this)" id="btn-fast"></button>
    </div>

    <div class="time-bar-container" id="time-bar-wrap">
        <div id="time-fill" class="time-bar-fill"></div>
    </div>

    <div class="rank-combo-wrapper" id="rank-wrap">
        <div id="rank-text" class="rank-label">PERFECT</div>
        <div id="combo-label">X0</div>
    </div>

    <div class="quiz-card" id="quiz-main-card">
        <div id="kanji-main">...</div>
        <p id="quiz-status" class="text-[#a8a7a7] font-black text-[11px] mt-2"></p>
    </div>

    <div id="answer-options" class="answer-grid"></div>

    <script>
        let quizData = [];
        let allPool = [];
        let currentIndex = 0;
        let speed = 3000;
        let combo = 0;
        let maxCombo = 0;
        let gameMode = 'han'; 
        const stats = { PERFECT: 0, MISS: 0 };
        
        const lang = localStorage.getItem('sumiLang') || 'vi';
        const i18n = {
            vi: {
                status: "trả lời đúng trước khi hết thời gian!",
                han: "hán việt", mean: "ý nghĩa",
                slow: "dễ", mid: "vừa", fast: "khó",
                res_title: "kết quả thử thách",
                again: "ôn tập lại", back: "quay lại",
                perfect: "hoàn hảo", miss: "trượt",
                accuracy: "chính xác"
            },
            en: {
                status: "answer before time runs out!",
                han: "sino-viet", mean: "meaning",
                slow: "easy", mid: "mid", fast: "hard",
                res_title: "challenge result",
                again: "retry", back: "back",
                perfect: "perfect", miss: "miss",
                accuracy: "accuracy"
            }
        };

        const t = i18n[lang];

        async function init() {
            document.getElementById('mode-han-btn').innerText = t.han;
            document.getElementById('mode-mean-btn').innerText = t.mean;
            document.getElementById('btn-slow').innerText = t.slow;
            document.getElementById('btn-mid').innerText = t.mid;
            document.getElementById('btn-fast').innerText = t.fast;
            document.getElementById('quiz-status').innerText = t.status;

            try {
                const params = new URLSearchParams(window.location.search);
                const targetId = params.get('id') || "0";
                const res = await fetch('sumi_ai_FULL_DATA_multi_lang.json');
                const data = await res.json();
                allPool = data.radicals;
                quizData = data.radicals.filter(r => parseInt(r.level_id) === parseInt(targetId));
                quizData.sort(() => 0.5 - Math.random());
                play();
            } catch (e) { console.error("Lỗi dữ liệu"); }
        }

        function switchMode(mode) {
            gameMode = mode;
            document.getElementById('mode-han-btn').classList.toggle('active', mode === 'han');
            document.getElementById('mode-mean-btn').classList.toggle('active', mode === 'mean');
            resetGame();
            play();
        }

        function updateSpeed(ms, btn) {
            speed = ms;
            document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            resetGame();
            play();
        }

        function resetGame() {
            currentIndex = 0; combo = 0; maxCombo = 0;
            stats.PERFECT = 0; stats.MISS = 0;
        }

        function play() {
            if (currentIndex >= quizData.length) {
                showFinalResult();
                return;
            }
            const item = quizData[currentIndex];
            document.getElementById('kanji-main').innerText = item.radical.split(' ')[0];
            const correct = (gameMode === 'han') ? item.han_viet : (item.meanings[lang] || item.meanings['vi']);
            
            let opts = [correct];
            while(opts.length < 4) {
                let rand = allPool[Math.floor(Math.random()*allPool.length)];
                let randVal = (gameMode === 'han') ? rand.han_viet : (rand.meanings[lang] || rand.meanings['vi']);
                if(!opts.includes(randVal) && randVal !== "") opts.push(randVal);
            }
            opts.sort(() => 0.5 - Math.random());
            
            const container = document.getElementById('answer-options');
            container.innerHTML = '';
            opts.forEach(o => {
                const b = document.createElement('button');
                b.className = 'btn-rhythm';
                b.innerHTML = `<span class="btn-meaning">${o}</span>`;
                b.onclick = () => handleInput(o, correct);
                container.appendChild(b);
            });
            startTimeBar();
        }

        let timer;
        function startTimeBar() {
            const fill = document.getElementById('time-fill');
            fill.style.transition = 'none';
            fill.style.width = '100%';
            
            setTimeout(() => {
                fill.style.transition = `width ${speed}ms linear`;
                fill.style.width = '0%';
                clearTimeout(timer);
                timer = setTimeout(() => processResult('MISS'), speed);
            }, 50);
        }

        function handleInput(sel, cor) {
            clearTimeout(timer);
            if (sel === cor) processResult('PERFECT');
            else processResult('MISS');
        }

        function processResult(rank) {
            const lbl = document.getElementById('rank-text');
            const comboLbl = document.getElementById('combo-label');
            lbl.innerText = rank;
            stats[rank]++;

            if (rank === 'PERFECT') {
                combo++; if (combo > maxCombo) maxCombo = combo;
                lbl.style.color = 'var(--perfect-red)';
                document.getElementById('snd-perfect').play();
            } else {
                combo = 0;
                lbl.style.color = 'var(--miss-gray)';
                document.getElementById('snd-miss').play();
            }

            comboLbl.innerText = `X${combo}`;
            comboLbl.style.opacity = combo > 1 ? '1' : '0';
            
            [lbl, comboLbl].forEach(el => {
                el.classList.remove('float-up-animation');
                void el.offsetWidth;
                el.classList.add('float-up-animation');
            });

            setTimeout(() => { currentIndex++; play(); }, 800);
        }

        function goBackSafe() {
            // Hàm quay lại an toàn
            if (document.referrer && document.referrer.indexOf(window.location.host) !== -1) {
                window.history.back();
            } else {
                // Thay 'index.html' bằng URL trang chủ của bạn nếu cần
                window.location.href = 'index.html'; 
            }
        }

        function showFinalResult() {
            const accuracy = Math.round((stats.PERFECT / quizData.length) * 100);
            document.getElementById('answer-options').innerHTML = '';
            document.getElementById('time-bar-wrap').style.display = 'none';
            document.getElementById('rank-wrap').style.display = 'none';
            document.getElementById('quiz-main-card').innerHTML = `
                <div class="w-full">
                    <h2 class="font-black text-forest-green text-lg uppercase mb-3">${t.res_title}</h2>
                    <div class="res-grid">
                        <div class="res-item"><span class="res-label">${t.perfect}</span><span class="res-count text-[#ff1744]">${stats.PERFECT}</span></div>
                        <div class="res-item"><span class="res-label">${t.miss}</span><span class="res-count text-gray-500">${stats.MISS}</span></div>
                        <div class="res-item"><span class="res-label">${t.accuracy}</span><span class="res-count text-[#e67e22]">${accuracy}%</span></div>
                        <div class="res-item" style="background:#fff3e0; border:none;"><span class="res-label" style="color:#e65100; opacity:0.6;">Combo Max</span><span class="res-count text-[#ff5722]">x${maxCombo}</span></div>
                    </div>
                    <div class="flex flex-col gap-3 mt-6">
                        <button onclick="location.reload()" class="bg-forest-green text-white py-4 rounded-full font-black uppercase text-[12px] tracking-widest active:scale-95 transition-all shadow-md w-full">
                            ${t.again}
                        </button>
                        <button onclick="goBackSafe()" class="bg-white text-forest-green border-2 border-forest-green py-4 rounded-full font-black uppercase text-[12px] tracking-widest active:scale-95 transition-all w-full">
                            ${t.back}
                        </button>
                    </div>
                </div>
            `;
        }
        init();
    </script>
</body>
</html>
