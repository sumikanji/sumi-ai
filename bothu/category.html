<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Be+Vietnam+Pro:wght@100;300;400;700&display=swap" rel="stylesheet">
    <title>Sumi AI - Khu Vườn Bộ Thủ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --forest-green: #558b2f;
            --soft-green: #f1f8e9;
            --candy-orange: #ffb74d;
            --deep-orange: #e67e22;
            --bg-dot: #c5e1a5;
        }

        body { 
            background-color: var(--soft-green); 
            background-image: radial-gradient(var(--bg-dot) 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: 'Be Vietnam Pro', sans-serif;
            text-transform: lowercase;
            margin: 0;
            -webkit-tap-highlight-color: transparent;
        }

        /* BANNER TỐI ƯU: KHÔNG CHỒNG CHỮ */
        .garden-header {
            background-color: var(--forest-green); 
            color: white;
            border-radius: 0 0 40px 40px; 
            padding: 20px 15px 35px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(85, 139, 47, 0.15);
            max-width: 100%;
            margin: 0;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px; /* Khoảng cách an toàn giữa nút và tiêu đề */
        }

        @media (min-width: 768px) {
            .garden-header {
                border-radius: 40px;
                max-width: 1024px;
                margin: 20px auto 40px;
                width: 95%;
                border: 4px solid white;
            }
        }

        /* Nút quay lại linh hoạt */
        .btn-back-mini {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            padding: 8px 16px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: 900;
            text-transform: uppercase;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-decoration: none;
            transition: all 0.2s;
        }

        /* SUB PHỤ NỀN CAM GIỐNG IMG_8916_2.jpg */
        #cat-subtitle-name {
            display: inline-block;
            background-color: var(--candy-orange);
            color: white;
            font-size: 14px; 
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 8px 25px;
            border-radius: 50px;
            box-shadow: 0 4px 0px var(--deep-orange);
            border: 2.5px solid white;
            margin-top: 5px;
        }

        /* KHÓA GIAO DIỆN NGANG CHO THẺ */
        .radical-card {
            background: white;
            border-radius: 25px;
            border: 3px solid #f9d9a5; 
            box-shadow: 0 6px 0 #f3c677;
            display: flex;
            flex-direction: row !important; /* Luôn nằm ngang */
            padding: 15px;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
            width: 100%;
            box-sizing: border-box;
        }

        /* KHUNG ICON KANJI CỐ ĐỊNH */
        .radical-icon-box {
            width: 90px; 
            height: 90px;
            border: 2px solid #f9d9a5;
            border-radius: 20px;
            background: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            flex-shrink: 0;
            overflow: hidden;
        }

        .card-content {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }

        /* KHUNG VÍ DỤ TO RÕ */
        .example-pill {
            background: #fcfcfc; 
            border: 1px solid #f0f0f0; 
            border-radius: 12px;
            padding: 6px 12px;
            display: flex; 
            align-items: center;
            gap: 10px;
            margin-top: 8px;
            overflow-x: auto;
            white-space: nowrap;
        }
/* Container chứa danh sách ví dụ - Cho phép xuống dòng */
    .ex-list-container {
        display: flex;
        flex-wrap: wrap; /* TỰ ĐỘNG XUỐNG DÒNG KHI HẾT CHỖ */
        gap: 8px 12px; /* Khoảng cách giữa các dòng và các mục */
        align-items: center;
        flex: 1; /* Chiếm hết diện tích còn lại */
    }
        /* Kanji ví dụ: Mảnh và dễ nhìn */
    .ex-kanji-text {
        font-family: 'Be Vietnam Pro', sans-serif;
        font-size: 1.3rem; 
        font-weight: 500; 
        color: #6b6a6a;
        line-height: 1.2;
    }

    .ex-meaning-text {
        font-size: 13px;
        color: #a8a7a7;
        font-weight: 500;
    }

        #garden-container {
            max-width: 1024px;
            margin: 0 auto;
        }
        
.practice-btn {
    background-color: var(--candy-orange);
    color: white;
    font-family: 'Montserrat', sans-serif;
    font-weight: 900;
    text-transform: uppercase;
    font-size: 16px;
    padding: 18px 40px;
    border-radius: 50px;
    box-shadow: 0 8px 0 var(--deep-orange);
    border: 3px solid white;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: all 0.2s;
    text-decoration: none;
    letter-spacing: 1px;
}

.practice-btn:active {
    transform: translateY(4px);
    box-shadow: 0 4px 0 var(--deep-orange);
}

.btn-icon {
    font-size: 22px;
}

@media (max-width: 767px) {
    .practice-btn {
        width: 100%;
        justify-content: center;
        font-size: 14px;
        padding: 15px 20px;
    }
}
    </style>
</head>
<body class="pb-10">

<header class="garden-header">
    <!-- Nút quay lại đã sửa để không chồng chữ -->
    <a href="bothu.html" class="btn-back-mini">
    ❮ <span id="back-btn-text">đang tải...</span>
</a>
    
    <div class="flex flex-col items-center">
        <h1 id="cat-main-name" class="text-3xl md:text-5xl font-black uppercase tracking-tighter leading-none">
            đang tải...
        </h1>
        <p id="cat-subtitle-name">đang tải...</p>
<!-- Tăng margin-top (mt-4) để tạo khoảng cách thoáng hơn -->
<p id="total-radicals" class="text-[12px] opacity-70 font-bold mt-4 tracking-widest uppercase"></p>
        
    </div>
</header>

<div id="garden-container" class="grid grid-cols-1 lg:grid-cols-2 gap-6 px-4 pt-6">
    <!-- Dữ liệu -->
</div>
<!-- NÚT BẮT ĐẦU LUYỆN TẬP -->
<div class="flex justify-center mt-12 mb-10 px-4">
    <a href="practice-modes.html" class="practice-btn" id="btn-start-practice">
        <span class="btn-icon">🔥</span>
        <span id="practice-text">đang tải...</span>
    </a>
</div>
<footer class="mt-16 text-center opacity-30 text-[10px] font-black uppercase tracking-[0.3em] pb-10">
    sumi ai farm • master radicals collection
</footer>

<script>
async function renderGarden() {
    const params = new URLSearchParams(window.location.search);
    const targetId = params.get('id');
    const lang = localStorage.getItem('sumiLang') || 'vi';

    if (targetId === null) {
        window.location.href = 'bothu.html';
        return;
    }

    // --- ĐOẠN THÊM MỚI ĐỂ SỬA LỖI ---
    // Cập nhật link cho nút bắt đầu luyện tập kèm theo ID
    const startBtn = document.getElementById('btn-start-practice');
    if (startBtn) {
        startBtn.href = `practice-modes.html?id=${targetId}`;
    }
    // --------------------------------

    try {
        const res = await fetch('sumi_ai_FULL_DATA_multi_lang.json');
        const data = await res.json();
        const filtered = data.radicals.filter(r => r.level_id == parseInt(targetId));
        // đếm số lượng và hiển thị
const totalElem = document.getElementById('total-radicals');
if (totalElem) {
    totalElem.innerText = lang === 'vi' ? `có ${filtered.length} bộ thủ` : `${filtered.length} radicals total`;
}
        const container = document.getElementById('garden-container');
        container.innerHTML = '';

        updateTitles(targetId, lang);

        filtered.forEach(item => {
            const card = document.createElement('div');
            card.className = 'radical-card';
            
            
            const radicalText = item.radical || "";
            const spaceIndex = radicalText.indexOf(' ');
            let mainK = radicalText, subK = "";
            if (spaceIndex !== -1) {
                mainK = radicalText.substring(0, spaceIndex);
                subK = radicalText.substring(spaceIndex + 1);
            }

            let exHTML = '';
            if (item.examples && item.examples.length > 0) {
    const exItems = item.examples.slice(0, 3).map(ex => {
        const meaning = lang === 'en' ? (ex.en || ex.vi) : (ex.vi || ex.en);
        return `
            <div style="display: flex; align-items: center; gap: 4px; white-space: nowrap;">
                <span class="ex-kanji-text">${ex.kanji}</span>
                <span class="ex-meaning-text">(${meaning})</span>
            </div>`;
    }).join('<span style="opacity: 0.1; margin: 0 2px;">|</span>');

    // Container giờ đây có flex-wrap để tự động xuống dòng
    exHTML = `<div class="ex-list-container">${exItems}</div>`;
}

            card.innerHTML = `
                <div class="radical-icon-box">
                    <div class="flex items-baseline gap-1 -translate-y-1">
                        <span class="text-4xl font-black text-[#d35400]">${mainK}</span>
                        <span class="text-lg font-light text-[#d35400] opacity-60">${subK}</span>
                    </div>
                    <span class="absolute bottom-2 w-full text-center text-[10px] font-black uppercase text-[#d35400] tracking-wider">
                        ${item.han_viet}
                    </span>
                </div>

                <div class="card-content pl-2">
                    <h4 class="text-lg font-black text-[#558b2f] uppercase leading-none">${item.han_viet}</h4>
                    <p class="text-[14px] font-bold text-[#8d6e63] italic mt-1">${item.meanings[lang]}</p>
                    
                    <div class="example-pill">
                        <span class="text-[8px] font-black text-[#f3c677] uppercase border-r pr-2 border-gray-200">Ví dụ</span>
                        <div class="flex items-center gap-2">${exHTML}</div>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    } catch (e) { console.error("Lỗi:", e); }
}
function renderModes() {
    const params = new URLSearchParams(window.location.search);
    const targetId = params.get('id') || "0"; // Lấy ID nhóm bộ thủ từ URL
    const lang = localStorage.getItem('sumiLang') || 'vi';
    const data = langData[lang];

    // Cập nhật danh sách bước và truyền ID vào link
    const container = document.getElementById('steps-container');
    const icons = ["📇", "🎮", "📝", "⚡"];
    // Thêm ?id=${targetId} vào sau các đường dẫn
    const links = [
        `flashcard.html?id=${targetId}`, 
        `minigame.html?id=${targetId}`, 
        `quiz.html?id=${targetId}`, 
        `race.html?id=${targetId}`
    ];
    
    container.innerHTML = data.steps.map((text, i) => `
        <div class="step-row">
            <a href="${links[i]}" class="mode-card" id="step${i+1}">
                <div class="mode-icon">${icons[i]}</div>
                <div class="mode-title">
                    <span class="step-number">${data.stepLabel} 0${i+1}</span>
                    ${text}
                </div>
            </a>
        </div>
    `).join('');

    setTimeout(drawCurve, 150);
}
function updateTitles(targetId, lang) {
    const mainNames = {
        "0": "human & body", "1": "nature & elements", "2": "movement & space",
        "3": "society & objects", "4": "animals & fauna", "5": "tools & weapons", "6": "abstract & forms"
    };
    // định nghĩa nội dung nút luyện tập theo ngôn ngữ
    const practiceLabels = {
        "vi": "bắt đầu luyện tập thôi nào",
        "en": "let's start practicing"
    };
    // định nghĩa nội dung cho nút quay lại và nút luyện tập
    const labels = {
        "vi": {
            "back": "quay lại vườn",
            "practice": "bắt đầu luyện tập thôi nào"
        },
        "en": {
            "back": "back to garden",
            "practice": "let's start practicing"
        }
    };
    const subNames = {
        "vi": {
            "0": "con người & cơ thể", "1": "thiên nhiên & yếu tố", "2": "chuyển động & không gian",
            "3": "xã hội & vật dụng", "4": "động vật", "5": "công cụ & vũ khí", "6": "trừu tượng & hình thức"
        },
        "en": {
            "0": "human & body", "1": "nature & elements", "2": "movement & space",
            "3": "society & objects", "4": "animals & fauna", "5": "tools & weapons", "6": "abstract & forms"
        }
    };
    document.getElementById('cat-main-name').innerText = mainNames[targetId] || "group";
    document.getElementById('cat-subtitle-name').innerText = subNames[lang][targetId] || "";
    // Cập nhật chữ nút quay lại
    const backBtnElem = document.getElementById('back-btn-text');
    if (backBtnElem) {
        backBtnElem.innerText = labels[lang].back;
    }
    // cập nhật văn bản cho nút luyện tập dựa trên lang
    const practiceTextElem = document.getElementById('practice-text');
    if (practiceTextElem) {
        practiceTextElem.innerText = practiceLabels[lang] || practiceLabels["vi"];
    }

}

function changeLanguage(lang) {
    localStorage.setItem('sumiLang', lang);
    renderGarden(); 
}

window.onload = () => {
    const savedLang = localStorage.getItem('sumiLang') || 'vi';
    changeLanguage(savedLang); 
};
</script>
</body>
</html>
