<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sumi AI - Thử Thách Nối Bộ Thủ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Be+Vietnam+Pro:wght@100;300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --forest-green: #558b2f;
            --soft-green: #f1f8e9;
            --candy-orange: #ffb74d;
            --deep-orange: #e67e22;
            --bg-dot: #c5e1a5;
        }

        body {
            background-color: var(--soft-green);
            background-image: radial-gradient(var(--bg-dot) 1px, transparent 1px);
            background-size: 20px 20px;
            font-family: 'Be Vietnam Pro', sans-serif;
            text-transform: lowercase;
            margin: 0;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
        }

        .game-header {
            background-color: var(--forest-green);
            color: white; padding: 20px 40px;
            border-radius: 0 0 35px 35px; border: 3px solid white;
            text-align: center; box-shadow: 0 10px 30px rgba(85, 139, 47, 0.15);
            margin-bottom: 25px;
        }

        /* LƯỚI THẺ */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px; width: 95%; max-width: 800px; padding: 10px;
        }

        @media (min-width: 768px) {
            .game-grid { grid-template-columns: repeat(4, 1fr); }
        }

        .match-card {
            background: white; border-radius: 20px; height: 100px;
            display: flex; align-items: center; justify-content: center;
            border: 3px solid #f9d9a5; box-shadow: 0 6px 0 #f3c677;
            cursor: pointer; transition: all 0.2s; padding: 10px;
        }

        .match-card.selected {
            background: var(--candy-orange); color: white;
            border-color: white; transform: translateY(3px);
            box-shadow: 0 3px 0 var(--deep-orange);
        }

        .match-card.matched { visibility: hidden; opacity: 0; pointer-events: none; }

        .kanji-text { font-size: 2.5rem; font-weight: 700; color: var(--forest-green); }
        .meaning-text { font-size: 0.9rem; font-weight: 700; color: #8d6e63; text-transform: uppercase; line-height: 1.2; }
        .selected .kanji-text, .selected .meaning-text { color: white; }

        /* THANH CHỌN TRANG */
        .pagination-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
            padding: 0 20px;
        }

        .page-btn {
            background: white;
            border: 2px solid #f9d9a5;
            color: #8d6e63;
            padding: 8px 15px;
            border-radius: 12px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 12px;
            box-shadow: 0 3px 0 #f3c677;
        }

        .page-btn.active {
            background: var(--candy-orange);
            color: white;
            border-color: white;
            box-shadow: 0 3px 0 var(--deep-orange);
            transform: translateY(2px);
        }
        .mode-btn-small {
    background: rgba(255, 255, 255, 0.2);
    border: 2px solid white;
    color: white;
    font-size: 10px;
    font-weight: 900;
    padding: 8px 16px;
    border-radius: 15px;
    text-transform: uppercase;
    transition: all 0.2s;
    opacity: 0.8;
}

/* khi nút được chọn - chuyển sang màu cam candy */
.mode-btn-small.active {
    background-color: var(--candy-orange);
    color: white;
    opacity: 1;
    border-color: white;
    box-shadow: 0 4px 0px var(--deep-orange);
    transform: translateY(-2px);
}

/* hiệu ứng khi nhấn nút */
.mode-btn-small:active {
    transform: translateY(1px);
    box-shadow: 0 2px 0px var(--deep-orange);
}
    </style>
</head>
<body>

    <header class="game-header">
    <h1 id="header-title" style="font-family: 'Montserrat'; font-weight: 900; font-size: 25px; text-transform: uppercase;"></h1>
    <p id="game-status" style="font-size: 14px; opacity: 0.8; margin-top: 5px; font-weight: 700;"></p>
    
    <!-- BỘ CHỌN CHẾ ĐỘ CHƠI -->
    <div class="flex justify-center gap-2 mt-4">
        <button id="mode-han-btn" onclick="switchMode('han')" class="mode-btn-small">kanji + hán tự</button>
        <button id="mode-mean-btn" onclick="switchMode('mean')" class="mode-btn-small">kanji + nghĩa</button>
    </div>
</header>

    <!-- Khu vực chọn trang -->
    <div class="pagination-container" id="pagination">
        <!-- Các nút trang 1, 2, 3... render ở đây -->
    </div>

    <!-- Khu vực chơi game -->
    <div class="game-grid" id="game-grid">
        <!-- 6 cặp của trang đã chọn render ở đây -->
    </div>

    <div class="mt-8 flex flex-col items-center gap-4 pb-16">
    <a href="javascript:history.back()" id="exit-btn" style="color: var(--forest-green); font-weight: 700; text-decoration: none; font-size: 12px; opacity: 0.5; text-transform: uppercase;">
        ❮ <span id="exit-text">đang tải...</span>
    </a>
</div>
<!-- OVERLAY TỔNG KẾT -->
<div id="finish-overlay" class="fixed inset-0 bg-white/90 backdrop-blur-md z-50 hidden flex flex-col justify-center items-center text-center p-6">
    <div class="text-6xl mb-6">🏆</div>
    <h2 id="finish-title" class="text-3xl font-black text-[#558b2f] uppercase mb-2">hoàn thành!</h2>
    <p id="finish-desc" class="text-[#8d6e63] font-medium mb-8">bạn đã chinh phục tất cả các bộ thủ trong nhóm này.</p>
    
    <div class="flex flex-col gap-4 w-full max-w-xs">
        <button onclick="location.reload()" id="restart-btn" class="bg-[#ffb74d] text-white py-4 rounded-2xl font-black uppercase shadow-[0_6px_0_#e67e22] border-2 border-white active:translate-y-1 active:shadow-none transition-all">
            chơi lại từ đầu
        </button>
        <button onclick="history.back()" id="back-garden-btn" class="text-[#558b2f] font-bold uppercase tracking-widest text-xs opacity-60">
            quay lại vườn
        </button>
    </div>
</div>
    <script>
        let gameMode = 'han'; // Mặc định là kanji + hán tự
let allRadicals = [];
let globalMatchedIds = new Set();
let selectedCards = [];
let currentPageCards = [];
const lang = localStorage.getItem('sumiLang') || 'vi';

const labels = {
    "vi": {
        "mode_han": "kanji + hán tự",
        "mode_mean": "kanji + nghĩa",
        "header": "thử thách nối cặp",
        "initStatus": "chọn trang để bắt đầu",
        "playing": "đang chơi trang",
        "pairs": "cặp",
        "complete": "🎉 trang này đã xong!",
        "page": "trang",
        "exit": "quay lại lộ trình",
        "f_title": "tuyệt vời!",
        "f_desc": "bạn đã chinh phục toàn bộ bộ thủ nhóm này.",
        "f_again": "chơi lại từ đầu",
        "f_back": "quay lại vườn"
    },
    "en": {
        "mode_han": "kanji + sino",
        "mode_mean": "kanji + meaning",
        "header": "matching challenge",
        "initStatus": "select a page to start",
        "playing": "playing page",
        "pairs": "pairs",
        "complete": "🎉 page completed!",
        "page": "page",
        "exit": "back to path",
        "f_title": "congratulations!",
        "f_desc": "you mastered all radicals in this group.",
        "f_again": "play again",
        "f_back": "back to garden"
    }
};
function switchMode(mode) {
    if (gameMode === mode) return;
    gameMode = mode;
    
    // Cập nhật giao diện nút
    document.getElementById('mode-han-btn').classList.toggle('active', mode === 'han');
    document.getElementById('mode-mean-btn').classList.toggle('active', mode === 'mean');
    
    // Reset tiến trình khi đổi chế độ (hoặc giữ lại tùy bạn, ở đây tôi reset để thử thách mới)
    globalMatchedIds.clear();
    
    // Load lại trang hiện tại với chế độ mới
    const activePage = parseInt(document.querySelector('.page-btn.active').id.replace('page-btn-', ''));
    loadPage(activePage);
}
async function initGame() {
    document.getElementById('header-title').innerText = labels[lang].header;
    document.getElementById('game-status').innerText = labels[lang].initStatus;
    document.getElementById('exit-text').innerText = labels[lang].exit;
    document.getElementById('mode-han-btn').innerText = labels[lang].mode_han;
    document.getElementById('mode-mean-btn').innerText = labels[lang].mode_mean;
    document.getElementById('mode-han-btn').classList.add('active');

    try {
        const params = new URLSearchParams(window.location.search);
        const targetId = params.get('id') || "0";
        const res = await fetch('sumi_ai_FULL_DATA_multi_lang.json');
        const data = await res.json();
        
        allRadicals = data.radicals.filter(r => r.level_id == parseInt(targetId));
        
        renderPagination();
        loadPage(0);
    } catch (e) { console.error("Lỗi:", e); }
}

function renderPagination() {
    const pagination = document.getElementById('pagination');
    const totalPages = Math.ceil(allRadicals.length / 6);
    pagination.innerHTML = '';
    for (let i = 0; i < totalPages; i++) {
        const btn = document.createElement('button');
        btn.className = 'page-btn';
        btn.innerText = `${labels[lang].page} ${i + 1}`;
        btn.onclick = () => loadPage(i);
        btn.id = `page-btn-${i}`;
        pagination.appendChild(btn);
    }
}

function loadPage(pageIndex) {
    document.querySelectorAll('.page-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById(`page-btn-${pageIndex}`).classList.add('active');

    const start = pageIndex * 6;
    const subset = allRadicals.slice(start, start + 6);
    selectedCards = [];

    document.getElementById('game-status').innerText = 
        `${labels[lang].playing} ${pageIndex + 1} (${subset.length} ${labels[lang].pairs})`;

    currentPageCards = [];
    subset.forEach(item => {
        // Thẻ 1 luôn là Kanji
        currentPageCards.push({ id: item.radical, type: 'kanji', content: item.radical.split(' ')[0] });
        
        // Thẻ 2 thay đổi theo chế độ chơi
        const secondContent = (gameMode === 'han') ? item.han_viet : item.meanings[lang];
        currentPageCards.push({ id: item.radical, type: 'second', content: secondContent });
    });

    currentPageCards.sort(() => 0.5 - Math.random());
    renderGrid();
    checkPageComplete(subset);
}

function renderGrid() {
    const grid = document.getElementById('game-grid');
    grid.innerHTML = '';
    currentPageCards.forEach(cardData => {
        const card = document.createElement('div');
        card.className = 'match-card';
        // Nếu ID đã nằm trong danh sách globalMatchedIds thì ẩn thẻ đi
        if (globalMatchedIds.has(cardData.id)) {
            card.classList.add('matched');
        }
        
        card.dataset.id = cardData.id;
        card.dataset.type = cardData.type;
        const contentClass = cardData.type === 'kanji' ? 'kanji-text' : 'meaning-text';
        card.innerHTML = `<span class="${contentClass}">${cardData.content}</span>`;
        card.addEventListener('click', selectCard);
        grid.appendChild(card);
    });
}

function selectCard() {
    if (this.classList.contains('selected') || this.classList.contains('matched')) return;
    this.classList.add('selected');
    selectedCards.push(this);

    if (selectedCards.length === 2) {
        const [c1, c2] = selectedCards;
        if (c1.dataset.id === c2.dataset.id && c1.dataset.type !== c2.dataset.type) {
            setTimeout(() => {
                c1.classList.add('matched');
                c2.classList.add('matched');
                globalMatchedIds.add(c1.dataset.id); // Lưu vào bộ nhớ chung
                
                checkFinish();
                selectedCards = [];
            }, 300);
        } else {
            setTimeout(() => {
                c1.classList.remove('selected');
                c2.classList.remove('selected');
                selectedCards = [];
            }, 400);
        }
    }
}

function checkPageComplete(subset) {
    const isAllMatched = subset.every(item => globalMatchedIds.has(item.radical));
    if (isAllMatched) {
        document.getElementById('game-status').innerText = labels[lang].complete;
    }
}

function checkFinish() {
    if (globalMatchedIds.size === allRadicals.length) {
        showFinishOverlay();
    }
}

function showFinishOverlay() {
    const overlay = document.getElementById('finish-overlay');
    document.getElementById('finish-title').innerText = labels[lang].f_title;
    document.getElementById('finish-desc').innerText = labels[lang].f_desc;
    document.getElementById('restart-btn').innerText = labels[lang].f_again;
    document.getElementById('back-garden-btn').innerText = labels[lang].f_back;
    overlay.classList.remove('hidden');
}

window.onload = initGame;
    </script>
</body>
</html>
