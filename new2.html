<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sumi Kanji - Ultimate Responsive</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <style>
        :root {
            --bg: #121212;
            --page: #1e1e1e;
            --green: #81c784; 
            --orange: #ffb74d; 
            --red: #ff8a65;    
            --text: #e0e0e0;
            --border: #333;
            --muted: #555;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .workbook {
            width: 100%;
            max-width: 1100px; /* Max trên PC */
            background: var(--page);
            border-radius: 30px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column; /* Mobile ưu tiên dọc */
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        .page { width: 100%; padding: 30px 20px; display: flex; flex-direction: column; align-items: center; }

        /* TRANG TRÁI (TOP) */
        .page-left { border-bottom: 1px solid var(--border); perspective: 1000px; }
        
        .jlpt-badge {
            font-size: 0.65rem; color: var(--muted); border: 1px solid var(--muted);
            padding: 2px 10px; border-radius: 4px; align-self: flex-start;
            text-transform: uppercase; margin-bottom: 15px;
        }

        /* Thẻ lật co giãn theo màn hình */
        .flip-card {
            width: 100%;
            max-width: 300px; /* Giới hạn độ to trên mobile */
            aspect-ratio: 4 / 5; /* Giữ tỷ lệ thẻ */
            cursor: pointer; position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .flip-card.is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 30px;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; border: 2px solid var(--border);
            background: #252525;
            padding: 20px;
        }
        .card-back { transform: rotateY(180deg); background: #1a1a1a; }

        /* Bộ thủ */
        .radical-garden {
            background: rgba(0,0,0,0.2); padding: 8px 15px;
            border-radius: 12px; display: flex; gap: 10px;
            font-size: 1.1rem; font-weight: bold; margin: 15px 0;
        }

        .am-han-group { text-align: center; }
        .am-han-text { font-size: 2rem; font-weight: 700; color: var(--orange); text-transform: uppercase; margin: 0; }
        .am-han-mean { font-size: 0.85rem; color: #888; font-style: italic; }

        .mnemonic-box {
            margin-top: 20px; background: rgba(255, 138, 101, 0.08);
            padding: 20px; border-radius: 20px; border-left: 5px solid var(--red);
            width: 100%; font-size: 0.95rem; line-height: 1.6;
        }

        /* TRANG PHẢI (BOTTOM) */
        .page-right { background: #161616; padding-bottom: 50px; }
        .read-row { display: flex; width: 100%; gap: 10px; margin-bottom: 25px; }
        .read-box { flex: 1; padding: 10px; border-bottom: 2px solid #333; }
        .label { font-size: 0.6rem; color: #555; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .value { font-size: 1.1rem; font-weight: 700; color: var(--green); }

        /* Từ vựng */
        .vocab-item { background: rgba(255,255,255,0.02); padding: 20px; border-radius: 20px; margin-bottom: 12px; border: 1px solid #2a2a2a; width: 100%; }
        ruby { font-size: 1.6rem; font-weight: 700; color: #fff; }
        rt { font-size: 0.75rem; color: var(--orange); font-weight: 500; }
        .v-ex { display: block; margin-top: 10px; color: #888; font-size: 0.85rem; line-height: 1.5; }

        .btn-luyen {
            background: var(--green); color: #121212; border: none;
            padding: 12px 30px; border-radius: 50px; font-weight: 700;
            cursor: pointer; margin-top: 15px; font-family: inherit; font-size: 1rem;
        }

        /* ================= PC OPTIMIZATION ================= */
        @media (min-width: 900px) {
            body { padding: 40px; }
            .workbook { flex-direction: row; min-height: 750px; }
            .page { flex: 1; padding: 50px; }
            .page-left { border-bottom: none; border-right: 1px solid var(--border); }
            .flip-card { max-width: 320px; }
            .am-han-text { font-size: 2.8rem; }
            .am-han-mean { font-size: 1rem; }
            .mnemonic-box { font-size: 1.1rem; }
            .value { font-size: 1.3rem; }
            /* Gáy sách giả trên PC */
            .workbook { position: relative; }
            .workbook::after {
                content: ""; position: absolute; left: 50%; top: 10%;
                width: 1px; height: 80%; background: #333;
            }
        }
    </style>
</head>
<body>

<div class="workbook">
    <!-- TRANG TRÁI -->
    <div class="page page-left">
        <div class="jlpt-badge">jlpt n4</div>
        
        <div class="flip-card" id="card" onclick="flipCard()">
            <div class="card-face card-front">
                <div id="k-static"></div>
                <div class="radical-garden">
                    <span style="color: var(--green);">言</span> • <span style="color: var(--orange);">五</span> • <span style="color: var(--red);">口</span>
                </div>
                <div class="am-han-group">
                    <p class="am-han-text">NGỮ</p>
                    <p class="am-han-mean">ngôn ngữ, từ ngữ</p>
                </div>
                <p style="font-size: 0.6rem; color: #444; margin-top: 10px;">chạm để viết</p>
            </div>
            
            <div class="card-face card-back">
                <div id="k-practice"></div>
                <button class="btn-luyen" onclick="event.stopPropagation(); writerP.quiz()">Bắt đầu viết ✏️</button>
            </div>
        </div>

        <div class="mnemonic-box">
            <b>Mẹo nhớ:</b> Dùng <b>lời nói (言)</b> của <b>năm (五)</b> cái <b>miệng (口)</b> để tạo thành <b>ngôn ngữ</b>.
        </div>
    </div>

    <!-- TRANG PHẢI -->
    <div class="page page-right">
        <div class="read-row">
            <div class="read-box"><span class="label">onyomi</span><span class="value">ゴ (go)</span></div>
            <div class="read-box"><span class="label">kunyomi</span><span class="value">かた.る</span></div>
        </div>

        <div class="vocab-list" style="width: 100%;">
            <div class="vocab-item">
                <ruby>日本語<rt>にほんご</rt></ruby>
                <span class="v-ex">日本語を勉強します。<br>(Tôi học tiếng Nhật.)</span>
            </div>
            <div class="vocab-item">
                <ruby>物語<rt>ものがたり</rt></ruby>
                <span class="v-ex">面白い物語ですね。<br>(Một câu chuyện thú vị nhỉ.)</span>
            </div>
        </div>
    </div>
</div>

<script>
    const char = '語';
    const strokeColors = [
        '#81c784','#81c784','#81c784','#81c784','#81c784','#81c784','#81c784',
        '#ffb74d','#ffb74d','#ffb74d','#ffb74d',
        '#ff8a65','#ff8a65','#ff8a65'
    ];

    // Hàm đo kích thước container để vẽ Kanji vừa vặn
    function getKanjiSize() {
        const cardWidth = document.querySelector('.card-face').clientWidth;
        return cardWidth * 0.6; // Chữ chiếm 60% chiều rộng thẻ
    }

    let writerS, writerP;

    function initKanji() {
        const size = getKanjiSize();
        
        // Clear nếu đã tồn tại (cho trường hợp resize)
        document.getElementById('k-static').innerHTML = '';
        document.getElementById('k-practice').innerHTML = '';

        writerS = HanziWriter.create('k-static', char, {
            width: size, height: size, padding: 5,
            showOutline: true, outlineColor: '#333', strokeAnimationSpeed: 0
        });

        writerP = HanziWriter.create('k-practice', char, {
            width: size, height: size, padding: 5,
            showOutline: true, outlineColor: '#333'
        });

        strokeColors.forEach((color, i) => {
            writerS.updateColor('strokeColor', color, { strokeNum: i });
            writerP.updateColor('strokeColor', color, { strokeNum: i });
        });
        writerS.showCharacter();
    }

    function flipCard() {
        document.getElementById('card').classList.toggle('is-flipped');
        if (document.getElementById('card').classList.contains('is-flipped')) {
            setTimeout(() => writerP.animateCharacter(), 300);
        }
    }

    window.onload = initKanji;
    // Tối ưu khi xoay màn hình điện thoại
    window.onresize = initKanji;
</script>

</body>
</html>
