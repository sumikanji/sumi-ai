<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sumi Kanji - Responsive Design</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <style>
        :root {
            --bg: #121212;
            --page: #1e1e1e;
            --green: #81c784; 
            --orange: #ffb74d; 
            --red: #ff8a65;    
            --text: #e0e0e0;
            --border: #333;
            --muted: #4a4a4a;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .workbook {
            width: 100%;
            max-width: 1100px;
            background: var(--page);
            border-radius: 40px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column; /* Mặc định dọc (mobile) */
            box-shadow: 0 40px 100px rgba(0,0,0,0.6);
            position: relative;
            overflow: hidden;
        }

        .page { flex: 1; padding: 40px 25px; display: flex; flex-direction: column; align-items: center; }

        /* --- TRANG TRÁI --- */
        .page-left { border-bottom: 1px solid var(--border); perspective: 1000px; }
        
        .jlpt-badge {
            font-size: 0.7rem; color: var(--muted); border: 1px solid var(--muted);
            padding: 3px 12px; border-radius: 5px; align-self: flex-start;
            text-transform: uppercase; margin-bottom: 20px;
        }

        /* Container Thẻ Lật */
        .flip-card {
            width: 280px; height: 350px; /* Size mobile */
            cursor: pointer; position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .flip-card.is-flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; border-radius: 35px;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; border: 2px solid var(--border);
            background: #252525;
        }
        .card-back { transform: rotateY(180deg); background: #1a1a1a; }

        .radical-garden {
            background: rgba(0,0,0,0.2); padding: 8px 15px;
            border-radius: 15px; display: flex; gap: 10px;
            font-size: 1.2rem; font-weight: bold; margin-top: 15px;
        }

        .am-han-group { text-align: center; margin-top: 15px; }
        .am-han-text { font-size: 2.2rem; font-weight: 700; color: var(--orange); text-transform: uppercase; margin: 0; }
        .am-han-mean { font-size: 0.9rem; color: #888; font-style: italic; }

        .mnemonic-highlight {
            margin-top: 30px; background: rgba(255, 138, 101, 0.08);
            padding: 20px; border-radius: 25px; border-left: 6px solid var(--red);
            width: 100%; box-sizing: border-box;
        }
        .mnemonic-highlight p { font-size: 1rem; line-height: 1.6; margin: 0; color: #fff; }

        /* --- TRANG PHẢI --- */
        .page-right { background: #161616; width: 100%; }
        .read-info { display: flex; width: 100%; gap: 10px; margin-bottom: 25px; }
        .read-box { flex: 1; padding: 10px; border-bottom: 2px solid #333; }
        .label { font-size: 0.6rem; color: #555; text-transform: uppercase; margin-bottom: 5px; display: block; }
        .value { font-size: 1.2rem; font-weight: 700; color: var(--green); }

        ruby { font-size: 1.8rem; font-weight: 700; color: #fff; }
        rt { font-size: 0.8rem; color: var(--orange); }
        .vocab-item { background: rgba(255,255,255,0.02); padding: 18px; border-radius: 20px; margin-bottom: 15px; border: 1px solid #2a2a2a; width: 100%; box-sizing: border-box; }
        .v-ex { display: block; margin-top: 10px; color: #888; font-size: 0.9rem; line-height: 1.5; }

        .btn-luyen {
            background: var(--green); color: #121212; border: none;
            padding: 15px 30px; border-radius: 50px; font-weight: 700;
            cursor: pointer; margin-top: 20px; font-family: inherit;
        }

        /* ======================================================
           PHẦN TỐI ƯU CHO MÁY TÍNH (Màn hình > 900px)
        ========================================================= */
        @media (min-width: 900px) {
            .workbook { flex-direction: row; min-height: 780px; }
            .page-left { border-bottom: none; border-right: 1px solid var(--border); }
            
            /* Phóng to thẻ Kanji trên máy tính */
            .flip-card { width: 350px; height: 420px; }
            .am-han-text { font-size: 3rem; }
            .radical-garden { font-size: 1.6rem; }
            .mnemonic-highlight p { font-size: 1.2rem; }
            
            /* Gáy sách chỉ hiện trên PC */
            .workbook::after {
                content: ""; position: absolute; left: 50%; top: 5%;
                width: 2px; height: 90%; background: linear-gradient(transparent, #333, transparent);
            }
        }
    </style>
</head>
<body>

<div class="workbook">
    <!-- TRANG TRÁI -->
    <div class="page page-left">
        <div class="jlpt-badge">jlpt n4</div>
        
        <div class="flip-card" id="card" onclick="flipCard()">
            <div class="card-face card-front">
                <div id="k-static"></div>
                <div class="radical-garden">
                    <span style="color: var(--green);">言</span> • <span style="color: var(--orange);">五</span> • <span style="color: var(--red);">口</span>
                </div>
                <div class="am-han-group">
                    <p class="am-han-text">NGỮ</p>
                    <p class="am-han-mean">ngôn ngữ, thuật ngữ</p>
                </div>
            </div>
            
            <div class="card-face card-back">
                <div id="k-practice"></div>
                <button class="btn-luyen" onclick="event.stopPropagation(); writerP.quiz()">luyện viết ✏️</button>
            </div>
        </div>

        <div class="mnemonic-highlight">
            <p>Dùng <b>lời nói (言)</b> của <b>năm (五)</b> cái <b>miệng (口)</b> để tạo thành <b>ngôn ngữ</b>.</p>
        </div>
    </div>

    <!-- TRANG PHẢI -->
    <div class="page page-right">
        <div class="read-info">
            <div class="read-box"><span class="label">onyomi</span><span class="value">ゴ (go)</span></div>
            <div class="read-box"><span class="label">kunyomi</span><span class="value">かた.る</span></div>
        </div>

        <div class="vocab-item">
            <ruby>日本語<rt>にほんご</rt></ruby>
            <span class="v-ex">日本語を勉強するのは楽しい。<br>(Học tiếng Nhật rất thú vị.)</span>
        </div>
        <div class="vocab-item">
            <ruby>物語<rt>ものがたり</rt></ruby>
            <span class="v-ex">おじいさんから物語を聞く。<br>(Nghe kể chuyện từ ông.)</span>
        </div>
    </div>
</div>

<script>
    const char = '語';
    const strokeColors = [
        '#81c784','#81c784','#81c784','#81c784','#81c784','#81c784','#81c784',
        '#ffb74d','#ffb74d','#ffb74d','#ffb74d',
        '#ff8a65','#ff8a65','#ff8a65'
    ];

    // Xác định kích thước Kanji dựa trên màn hình
    const kanjiSize = window.innerWidth > 900 ? 200 : 160;

    const writerS = HanziWriter.create('k-static', char, {
        width: kanjiSize, height: kanjiSize, padding: 10,
        showOutline: true, outlineColor: '#333', strokeAnimationSpeed: 0
    });

    const writerP = HanziWriter.create('k-practice', char, {
        width: kanjiSize, height: kanjiSize, padding: 10,
        showOutline: true, outlineColor: '#333'
    });

    function flipCard() {
        document.getElementById('card').classList.toggle('is-flipped');
        if (document.getElementById('card').classList.contains('is-flipped')) {
            strokeColors.forEach((color, i) => {
                writerP.updateColor('strokeColor', color, { strokeNum: i });
            });
            setTimeout(() => writerP.animateCharacter(), 300);
        }
    }

    window.onload = function() {
        strokeColors.forEach((color, i) => {
            writerS.updateColor('strokeColor', color, { strokeNum: i });
        });
        writerS.showCharacter();
    };
</script>

</body>
</html>
