<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sumi AI - Intellectual Archive PC (Light Edition)</title>
    <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@600&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
    <style>
        :root {
            --bg: #f0f2f5;
            --container-bg: #ffffff;
            --card-pill: #f8f9fa;
            --green-glow: #26a69a;
            --orange: #e67e22; 
            --border: #e0e0e0;
            --text-main: #2c3e50;
            --text-muted: #7f8c8d;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: lowercase;
            overflow: hidden;
        }

        .main-wrapper {
            width: 95%;
            max-width: 1300px;
            height: 90vh;
            background: var(--container-bg);
            border-radius: 40px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 20px 60px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        .top-banner {
            padding: 25px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .brand-info h1 { font-size: 1.8rem; margin: 0; letter-spacing: 5px; color: var(--green-glow); text-transform: uppercase;}
        
        .flip-stat {
            background: var(--card-pill); padding: 8px 20px; border-radius: 12px; border: 1px solid var(--border); text-align: center;
            display: inline-block; margin-left: 10px;
        }
        .flip-num { font-size: 1.5rem; font-weight: 700; color: var(--green-glow); display: block; }
        .flip-label { font-size: 0.5rem; color: var(--text-muted); text-transform: uppercase; }

        /* HƯỚNG DẪN TRANG CHÍNH */
        .guide-box {
            background: #fff;
            padding: 15px 30px; border-radius: 20px;
            margin: 20px 50px 0; border: 1px dashed var(--border);
            display: flex; align-items: center; gap: 15px;
        }
        .guide-text { font-size: 0.85rem; color: var(--text-muted); line-height: 1.4; }

        .content-body { flex: 1; position: relative; overflow: hidden; }

        /* DANH SÁCH VIÊN THUỐC */
        .pills-view {
            height: 100%;
            padding: 40px 50px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            overflow-y: auto;
        }

        /* 1. Định nghĩa chuyển động xuất hiện */
@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(20px) scale(0.9);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

/* 2. Hiệu ứng bồng bềnh nhẹ nhàng cho toàn bộ viên thuốc */
@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-5px); }
    100% { transform: translateY(0px); }
}

/* 3. Ghi đè class .lesson-pill để thêm hiệu ứng */
.lesson-pill {
    background: var(--card-pill);
    border-radius: 100px;
    padding: 25px 40px; /* Tăng độ mập mạp như cậu thích */
    display: flex;
    align-items: center;
    justify-content: space-between;
    border: 2px solid var(--border); /* Viền đậm hơn chút cho rõ khối */
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Hiệu ứng đàn hồi */
    
    /* Animation khi mới hiện ra */
    animation: fadeInUp 0.5s ease backwards;
}

/* Hiệu ứng khi di chuột (Hover) */
.lesson-pill:hover {
    border-color: var(--green-glow);
    background: #ffffff;
    box-shadow: 0 15px 30px rgba(38, 166, 154, 0.15);
    transform: translateY(-8px) scale(1.02); /* Bay lên và to ra nhẹ */
}

/* Hiệu ứng riêng cho mũi tên bên trong khi hover */
.lesson-pill:hover .pill-arrow {
    transform: translateX(5px);
    color: var(--orange);
}

.pill-arrow {
    font-size: 1.5rem;
    color: var(--green-glow);
    transition: 0.3s ease;
}
        .lesson-pill.active { background: #e0f2f1; border-color: var(--green-glow); }
        .pill-text b { font-size: 0.9rem; color: var(--text-main); }
        .pill-text span { display: block; font-size: 0.6rem; color: var(--green-glow); font-weight: 700; }

        /* MANUSCRIPT VIEW (TRANG BẢN THẢO) */
        .manuscript-view {
            position: absolute; inset: 0;
            display: none;
            flex-direction: row;
            background: #fff;
            z-index: 5;
        }
        .manuscript-view.active { display: flex; }

        .page-left { 
            flex: 0 0 30%; 
            background: #fafafa; 
            border-right: 1px solid var(--border); 
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .page-right { 
            flex: 0 0 70%; 
            padding: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-illuminate {
            background: var(--green-glow); color: #fff; border: none;
            padding: 15px 35px; border-radius: 50px; font-weight: 700;
            cursor: pointer; margin-bottom: 25px; font-family: inherit;
            text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
            width: fit-content; font-size: 0.9rem;
            box-shadow: 0 10px 20px rgba(38, 166, 154, 0.2);
        }
        .btn-illuminate:hover { background: var(--orange); transform: translateY(-2px); }

        /* LƯỚI KANJI */
        .kanji-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 850px;
        }

        .kanji-item {
            background: #fff;
            aspect-ratio: 1 / 1;
            border-radius: 30px;
            border: 2px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .kanji-item:hover { border-color: var(--green-glow); transform: scale(1.05); }

        .kanji-char {
            font-family: 'Klee One', cursive;
            font-size: clamp(3rem, 10vh, 4.5rem);
            color: var(--green-glow);
            line-height: 1;
        }

        .kanji-hv {
            font-size: 1rem;
            color: var(--text-muted);
            font-weight: 700;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        /* CHI TIẾT OVERLAY */
        .detail-view {
            position: absolute; inset: 0; background: #fff; z-index: 10; 
            display: none; padding: 60px; align-items: center; justify-content: center;
        }
        .detail-view.active { display: flex; }
        #draw-box { border: 1px solid var(--border); border-radius: 20px; background: #fafafa; }
        .btn-back { margin-top: 30px; background: none; border: 1px solid var(--border); color: var(--text-muted); padding: 12px 30px; border-radius: 50px; cursor: pointer; font-family: inherit; font-size: 0.85rem; }
    /* --- TỐI ƯU HÓA MOBILE (BREAKPOINT 768PX) --- */
@media (max-width: 768px) {
    .main-wrapper {
        width: 100%; /* Tràn viền màn hình điện thoại */
        height: 100vh;
        border-radius: 0; /* Loại bỏ bo góc ngoài cùng để tối ưu diện tích */
    }

    .top-banner {
        padding: 15px 20px; /* Thu hẹp khoảng cách header */
        flex-direction: column; /* Xếp chồng tên JLPT và chỉ số stats */
        align-items: flex-start;
        gap: 10px;
    }

    .stats-hub {
        width: 100%;
        justify-content: flex-start;
    }
}
@media (max-width: 768px) {
    .pills-view {
        padding: 10px 20px 30px;
        display: flex;
        flex-direction: column; /* Xếp dọc các bài học */
        gap: 15px;
        align-content: flex-start;
    }

    .lesson-pill {
        flex: 1 1 auto;
        width: 100%; /* Giãn tối đa chiều ngang */
        height: 90px; /* Chiều cao cố định để không bị biến dạng */
        padding: 20px 30px; /* Vẫn giữ độ mập mạp nhưng vừa vặn hơn */
    }

    .pill-text b { font-size: 1rem; }
}
@media (max-width: 768px) {
    .manuscript-view {
        flex-direction: column; /* Xoay dọc trang học */
        overflow-y: auto;
    }

    .page-left {
        flex: 0 0 auto;
        padding: 20px;
        border-right: none;
        border-bottom: 1px solid var(--border);
    }

    .page-right {
        padding: 20px;
    }

    .kanji-grid {
        grid-template-columns: repeat(3, 1fr); /* Giảm còn 3 cột để ô Kanji đủ to */
        gap: 10px;
    }

    /* Bảng vẽ chi tiết */
    .detail-view {
        flex-direction: column;
        padding: 20px;
    }

    #draw-box {
        width: 280px !important; /* Kích thước vừa khít chiều ngang điện thoại */
        height: 280px !important;
    }
}
    </style>
</head>
<body>

    <div class="main-wrapper">
        <header class="top-banner">
            <div class="brand-info"><h1>JLPT N5</h1></div>
            
            <div class="stats-hub">
                <div class="flip-stat">
                    <span class="flip-num" id="mastered-count">0</span>
                    <span class="flip-label">mastered</span>
                </div>
                <div class="flip-stat">
                    <span class="flip-num">100</span>
                    <span class="flip-label">total archive</span>
                </div>
            </div>
        </header>

    

         <main class="content-body">
            <div class="pills-view" id="pills-container">
                <!-- Khung hướng dẫn nằm trong này để tự mất khi chuyển trang -->
                
            </div>
            <!-- BẢN THẢO (KHÔNG CÒN VĂN BẢN HƯỚNG DẪN) -->
            <div class="manuscript-view" id="manuscript-modal">
                <div class="page-left">
                    <h2 style="font-size: 2.2rem; color: var(--green-glow); margin-bottom: 25px;" id="lesson-name">...</h2>
                    
                    <button class="btn-illuminate" id="btn-master-lesson">thắp sáng bài học ✨</button>
                    
                    <button style="background: none; border: none; color: #ccc; cursor: pointer; font-weight: 700; font-size: 0.8rem;" onclick="backToPills()">[ quay lại thư viện ]</button>
                </div>
                <div class="page-right">
                    <div class="kanji-grid" id="kanji-list-body"></div>
                </div>
            </div>

            <div class="detail-view" id="kanji-detail">
                <div style="flex: 1; text-align: center;">
                    <div id="draw-box"></div>
                </div>
                <div style="flex: 1; padding-left: 50px;">
                    <h2 id="det-hv" style="font-size: 4rem; color: var(--green-glow); margin: 0;"></h2>
                    <div style="margin: 25px 0; color: var(--text-muted); font-size: 1.1rem;">
                        <p><b>onyomi:</b> <span id="det-on"></span></p>
                        <p><b>kunyomi:</b> <span id="det-kun"></span></p>
                    </div>
                    <button class="btn-back" onclick="hideDetail()">[ khép lại ]</button>
                </div>
            </div>
        </main>
    </div>

<script>
    let allData = [];
    let writer = null;

    async function init() {
        try {
            const res = await fetch('JLPT.json');
            const data = await res.json();
            allData = data["N5"] || [];
            updateMastery();
            renderPills();
        } catch (e) { console.error("lỗi tải dữ liệu"); }
    }

    function updateMastery() {
        const mastered = JSON.parse(localStorage.getItem('sumi_garden_n5') || '[]');
        document.getElementById('mastered-count').innerText = mastered.length;
    }

    function renderPills() {
    const container = document.getElementById('pills-container');
    container.innerHTML = '';
    const lessons = Math.ceil(allData.length / 10);
    const mastered = JSON.parse(localStorage.getItem('sumi_garden_n5') || '[]');

    for (let i = 0; i < lessons; i++) {
        const kanjis = allData.slice(i * 10, (i + 1) * 10);
        const isDone = kanjis.every(k => mastered.includes(k.c));
        const pill = document.createElement('div');
        pill.className = `lesson-pill ${isDone ? 'active' : ''}`;
        
        // Thêm độ trễ (delay) dựa trên số thứ tự i để các khối hiện lần lượt
        pill.style.animationDelay = `${i * 0.1}s`; 

        pill.innerHTML = `
            <div class="pill-text">
                <b>bài học ${String(i + 1).padStart(2, '0')}</b>
                <span>10 kanji archive</span>
            </div>
            <div class="pill-arrow">➔</div>
        `;
        pill.onclick = () => openManuscript(kanjis, i + 1);
        container.appendChild(pill);
    }
}

    function openManuscript(kanjis, index) {
        document.getElementById('manuscript-modal').classList.add('active');
        document.getElementById('lesson-name').innerText = `bài học ${String(index).padStart(2, '0')}`;
        const list = document.getElementById('kanji-list-body');
        list.innerHTML = '';
        kanjis.forEach(k => {
            const item = document.createElement('div');
            item.className = 'kanji-item';
            item.innerHTML = `<div class="kanji-char">${k.c}</div><div class="kanji-hv">${k.hv}</div>`;
            item.onclick = (e) => { e.stopPropagation(); showDetail(k); };
            list.appendChild(item);
        });
        document.getElementById('btn-master-lesson').onclick = () => {
            let masteredK = JSON.parse(localStorage.getItem('sumi_garden_n5') || '[]');
            kanjis.forEach(k => { if(!masteredK.includes(k.c)) masteredK.push(k.c); });
            localStorage.setItem('sumi_garden_n5', JSON.stringify(masteredK));
            updateMastery();
            renderPills();
            backToPills();
        };
    }

    function showDetail(item) {
        const overlay = document.getElementById('kanji-detail');
        overlay.classList.add('active');
        document.getElementById('det-hv').innerText = item.hv;
        document.getElementById('det-on').innerText = item.on || '---';
        document.getElementById('det-kun').innerText = item.kun || '---';
        document.getElementById('draw-box').innerHTML = '';
        writer = HanziWriter.create('draw-box', item.c, { width: 320, height: 320, padding: 30, strokeColor: '#26a69a', outlineColor: '#f0f0f0', showOutline: true });
        writer.animateCharacter();
    }

    function hideDetail() { document.getElementById('kanji-detail').classList.remove('active'); }
    function backToPills() { document.getElementById('manuscript-modal').classList.remove('active'); hideDetail(); }
    window.onload = init;
</script>
</body>
</html>
